<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CowSwap Sprite Generator</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0814; color:#f0f0ff; font-family:monospace; padding:20px; }
  h1 { color:#a78bfa; font-size:14px; letter-spacing:3px; margin-bottom:16px; }
  .grid { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:24px; }
  .card {
    background:#12093a; border:1px solid #3d2080; border-radius:8px;
    padding:14px; display:flex; flex-direction:column; align-items:center; gap:10px;
    min-width:180px;
  }
  .card h3 { font-size:9px; color:#a78bfa; letter-spacing:2px; text-transform:uppercase; }
  canvas { image-rendering:pixelated; border:1px solid #2d1b60; border-radius:4px; background:#000; }
  .preview { image-rendering:pixelated; border:1px solid #2d1b60; border-radius:4px; }
  button {
    background:#3d2080; color:#a78bfa; border:1px solid #6c3fc4;
    padding:6px 14px; border-radius:4px; cursor:pointer; font-family:monospace;
    font-size:10px; letter-spacing:1px;
  }
  button:hover { background:#5b21b6; }
  .meta { font-size:9px; color:#666; letter-spacing:1px; }
  .sheet-section { margin-bottom:30px; }
  .sheet-section h2 { color:#f59e0b; font-size:11px; letter-spacing:2px; margin-bottom:12px; border-bottom:1px solid #2d1b60; padding-bottom:6px; }
  .all-btn {
    background:#5b21b6; color:#e0d0ff; border:1px solid #a78bfa;
    padding:10px 24px; border-radius:6px; cursor:pointer; font-family:monospace;
    font-size:11px; letter-spacing:2px; margin-bottom:20px;
  }
  .all-btn:hover { background:#7c3aed; }
  .info { font-size:9px; color:#555; margin-top:4px; }
</style>
</head>
<body>
<h1>⚔ COWSWAP MEV SLAYER — SPRITE EXPORT</h1>
<p style="font-size:10px;color:#666;margin-bottom:16px;">All sprites are 32×32px pixel art · 4-frame animation strips · PNG download</p>
<button class="all-btn" onclick="downloadAll()">⬇ DOWNLOAD ALL SPRITESHEETS</button>

<div id="sheets"></div>

<script>
// ── PIXEL ART PRIMITIVES ──
// Each sprite is drawn on a 32×32 canvas at 1x, then scaled for preview

const SCALE = 6; // preview scale

function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}

function px(ctx, x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

// ────────────────────────────────────────────
// SPRITE DEFINITIONS — each returns a 128×32 spritesheet (4 frames × 32px)
// ────────────────────────────────────────────

const sprites = {};

// ── SIR MOOINGTON (player cow knight) — walk + attack ──
sprites['sir_mooington'] = {
  label: 'Sir Mooington',
  desc: '128×32 · 4 frames (walk×2, idle, attack)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const legL = f===0?1:f===1?-1:0;
    const legR = -legL;
    const bob  = f===1?1:0;
    const atk  = f===3;

    const p = (x,y,w,h,c) => px(ctx, ox+x, y+bob, w, h, c);

    // shadow
    px(ctx, ox+8, 30, 16, 2, '#00000055');

    // LEGS
    p(6,  22+legL, 5, 8, '#7c3aed'); // left leg armor
    p(6,  28+legL, 5, 4, '#4c1d95');
    p(6,  30+legL, 7, 2, '#1e1b4b'); // boot
    p(20, 22+legR, 5, 8, '#7c3aed'); // right leg
    p(20, 28+legR, 5, 4, '#4c1d95');
    p(19, 30+legR, 7, 2, '#1e1b4b');

    // BODY armor
    p(7,  12, 18, 12, '#7c3aed');
    p(9,  14, 14, 9,  '#6d28d9');
    // chest detail
    p(11, 15, 3,  2,  '#8b5cf6');
    p(11, 19, 3,  2,  '#8b5cf6');
    // rivets
    p(9,  14, 2,  2,  '#4c1d95');
    p(20, 14, 2,  2,  '#4c1d95');
    p(9,  21, 2,  2,  '#4c1d95');
    p(20, 21, 2,  2,  '#4c1d95');

    // BODY white/cow
    p(8,  24, 16, 2, '#f5f0e8'); // underbelly strip

    // SPOTS on body
    p(18, 14, 5, 4, '#1a1a2a');
    p(10, 20, 3, 3, '#1a1a2a');

    // HEAD helmet
    p(8,  3,  16, 13, '#7c3aed');
    p(10, 5,  12, 10, '#6d28d9');
    // visor
    p(11, 9,  10, 4,  '#0f0a1f');
    p(12, 10, 8,  2,  '#312e81aa');
    // helmet top
    p(10, 1,  12, 4,  '#7c3aed');
    p(11, 0,  10, 3,  '#6d28d9');

    // HORNS through helmet
    p(5,  5,  4,  2,  '#d97706');
    p(3,  3,  4,  4,  '#d97706');
    p(3,  1,  2,  4,  '#fbbf24');
    p(23, 5,  4,  2,  '#d97706');
    p(25, 3,  4,  4,  '#d97706');
    p(27, 1,  2,  4,  '#fbbf24');

    // PLUME
    for(let i=0;i<6;i++){
      p(12+i, -1-i, 2, 5, i<3?'#f59e0b':'#8b5cf6');
    }

    // SHIELD (left)
    p(1, 13, 7, 12, '#7c3aed');
    p(2, 14, 5, 10, '#312e81');
    p(3, 16, 3, 2,  '#fbbf24'); // cow horns on shield
    p(3, 18, 2, 3,  '#f5f0e8');

    // SWORD (right)
    const sx = atk ? 6 : 0;
    const sy = atk ? -4 : 0;
    p(26+sx, 8+sy,  3, 20, '#dde3ff'); // blade
    p(24+sx, 13+sy, 7, 3,  '#f59e0b'); // guard
    p(27+sx, 6+sy,  2, 4,  '#c0c0ff'); // tip
    if(atk) {
      // slash aura
      px(ctx, ox+25, 4, 6, 2, '#ffe08088');
      px(ctx, ox+28, 8, 4, 2, '#ffe08066');
    }
  }
};

// ── FRONTRUNNER BOT ──
sprites['frontrunner'] = {
  label: 'Frontrunner',
  desc: '128×32 · 4 frames (hover anim)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const bob = [0,1,0,-1][f];
    const eyeOpen = f!==2;
    const jetSize = [3,4,5,4][f];

    const p = (x,y,w,h,c) => px(ctx, ox+x, y+bob, w, h, c);

    // JET FLAMES
    px(ctx, ox+5, 27+bob, 5, jetSize, '#f97316');
    px(ctx, ox+7, 27+bob, 2, jetSize-1, '#fbbf24');
    px(ctx, ox+20, 27+bob, 5, jetSize, '#f97316');
    px(ctx, ox+22, 27+bob, 2, jetSize-1, '#fbbf24');

    // LEGS/thrusters
    p(5,  22, 6, 6, '#991b1b');
    p(20, 22, 6, 6, '#991b1b');

    // BODY
    p(4,  10, 24, 14, '#7f1d1d');
    p(6,  12, 20, 10, '#ef4444');
    // speed lines
    p(8,  13, 14, 2, '#7f1d1d');
    p(8,  17, 14, 2, '#7f1d1d');
    p(8,  21, 14, 2, '#7f1d1d');

    // HEAD
    p(6,  2,  20, 10, '#7f1d1d');
    p(8,  4,  16, 7,  '#ef4444');

    // ANTENNA
    p(15, -3, 2, 6, '#7f1d1d');
    px(ctx, ox+13, -4+bob, 6, 3, eyeOpen?'#ef4444':'#991b1b');

    // EYES
    p(8,  5,  6, 4, '#0a0a0a');
    p(18, 5,  6, 4, '#0a0a0a');
    if(eyeOpen) {
      p(9,  6,  4, 2, '#ff0000');
      p(19, 6,  4, 2, '#ff0000');
    }

    // ARMS/claws
    p(0,  12, 4, 10, '#7f1d1d');
    p(-2, 19, 5, 3,  '#ef4444');
    p(28, 12, 4, 10, '#7f1d1d');
    p(29, 19, 5, 3,  '#ef4444');
  }
};

// ── SANDWICH BOT ──
sprites['sandwich_bot'] = {
  label: 'Sandwich Bot',
  desc: '128×32 · 4 frames',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const bob = [0,1,1,0][f];
    const mouthOpen = f===1||f===2;

    const p = (x,y,w,h,c) => px(ctx, ox+x, y+bob, w, h, c);

    // shadow
    px(ctx, ox+6, 30, 20, 2, '#00000044');

    // BOTTOM BUN (legs)
    p(2,  23, 28, 7, '#92400e');
    p(4,  24, 24, 5, '#d97706');
    // sesame seeds
    for(let i=0;i<4;i++) p(5+i*6, 25, 2, 2, '#fbbf24');

    // FILLING layers
    p(2,  19, 28, 5, '#15803d'); // lettuce
    p(2,  17, 28, 3, '#dc2626'); // tomato
    p(2,  15, 28, 3, '#78350f'); // meat patty

    // TOP BUN (torso)
    p(4,  9,  24, 8, '#92400e');
    p(6,  10, 20, 6, '#f59e0b');

    // HEAD
    p(6,  1,  20, 10, '#92400e');
    p(8,  2,  16, 8,  '#f59e0b');

    // EYES
    p(9,  4,  5, 4, '#0a0a0a');
    p(18, 4,  5, 4, '#0a0a0a');
    p(10, 5,  3, 2, '#f97316');
    p(19, 5,  3, 2, '#f97316');

    // MOUTH
    if(mouthOpen) {
      p(9, 9, 14, 2, '#0a0a0a');
      for(let i=0;i<4;i++) p(10+i*3, 10, 2, 2, '#f5f5f5');
    } else {
      p(9, 9, 14, 2, '#92400e');
    }

    // ARMS extending both sides
    p(-6, 13, 8, 5, '#92400e');
    p(-8, 11, 6, 9, '#f59e0b');
    p(30, 13, 8, 5, '#92400e');
    p(32, 11, 6, 9, '#f59e0b');
  }
};

// ── BACKRUNNER ──
sprites['backrunner'] = {
  label: 'Backrunner',
  desc: '128×32 · 4 frames (slow creep)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const legL = f===0?1:f===2?-1:0;
    const legR = -legL;
    const bob = [0,0,1,1][f];
    const glowPulse = f%2===0;

    const p = (x,y,w,h,c) => px(ctx, ox+x, y+bob, w, h, c);

    // LEGS
    p(8,  22+legL, 6, 9, '#5b21b6');
    p(8,  28+legL, 8, 3, '#1e1b4b');
    p(18, 22+legR, 6, 9, '#5b21b6');
    p(17, 28+legR, 8, 3, '#1e1b4b');

    // CLOAK / BODY
    p(5,  8,  22, 16, '#3b0764');
    p(7,  10, 18, 12, '#6d28d9');
    // cloak bottom fringes
    for(let i=0;i<5;i++) p(5+i*4, 22, 3, 3+(i%2), '#3b0764');

    // HOOD
    p(8,  1,  16, 10, '#3b0764');
    p(10, 3,  12, 7,  '#4c1d95');

    // FACE (shadowy)
    p(11, 5,  10, 5, '#0a0814');
    // Eyes glow
    if(glowPulse) {
      p(12, 7, 3, 2, '#a855f7');
      p(18, 7, 3, 2, '#a855f7');
    } else {
      p(12, 7, 3, 2, '#7c3aed');
      p(18, 7, 3, 2, '#7c3aed');
    }

    // ARMS
    p(1,  12, 5, 8, '#3b0764');
    p(26, 12, 5, 8, '#3b0764');

    // DATA TRAIL
    if(glowPulse) {
      px(ctx, ox-4, 12+bob, 3, 2, '#a855f744');
      px(ctx, ox-7, 15+bob, 2, 2, '#a855f722');
    }
  }
};

// ── JIT LP ──
sprites['jit_lp'] = {
  label: 'JIT LP',
  desc: '128×32 · 4 frames (diamond spin)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const bob = [0,1,0,-1][f];
    const spin = f; // 0,1,2,3 → different diamond widths to fake rotation

    const p = (x,y,w,h,c) => px(ctx, ox+x, y+bob, w, h, c);

    const widths = [12,8,12,8];
    const dw = widths[spin];
    const cx = 16, cy = 16;

    // Outer diamond glow
    for(let r=0;r<3;r++){
      const a = 0.15-r*0.04;
      ctx.globalAlpha=a;
      ctx.fillStyle='#06b6d4';
      ctx.beginPath();
      ctx.moveTo(ox+cx, cy-10-r*2+bob);
      ctx.lineTo(ox+cx+(dw/2+r*2), cy+bob);
      ctx.lineTo(ox+cx, cy+10+r*2+bob);
      ctx.lineTo(ox+cx-(dw/2+r*2), cy+bob);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha=1;

    // Main diamond body
    ctx.fillStyle='#164e63';
    ctx.beginPath();
    ctx.moveTo(ox+cx, cy-10+bob);
    ctx.lineTo(ox+cx+dw/2, cy+bob);
    ctx.lineTo(ox+cx, cy+10+bob);
    ctx.lineTo(ox+cx-dw/2, cy+bob);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle='#06b6d4';
    ctx.beginPath();
    ctx.moveTo(ox+cx, cy-8+bob);
    ctx.lineTo(ox+cx+dw/2-1, cy+bob);
    ctx.lineTo(ox+cx, cy+8+bob);
    ctx.lineTo(ox+cx-dw/2+1, cy+bob);
    ctx.closePath();
    ctx.fill();

    // Inner shine
    ctx.fillStyle='#22d3ee';
    ctx.beginPath();
    ctx.moveTo(ox+cx-dw/4, cy-3+bob);
    ctx.lineTo(ox+cx, cy-6+bob);
    ctx.lineTo(ox+cx+dw/4, cy-3+bob);
    ctx.lineTo(ox+cx, cy+bob);
    ctx.closePath();
    ctx.fill();

    // Eye in center
    p(cx-2, cy-2, 4, 4, '#0a0a0a');
    p(cx-1, cy-1, 2, 2, f%2===0?'#06b6d4':'#22d3ee');

    // Fee indicators (small floating dots)
    const dotPositions = [[cx-10,cy-2],[cx+8,cy-2],[cx-1,cy-10]];
    dotPositions.forEach(([dx,dy],i)=>{
      const visible = (f+i)%2===0;
      if(visible) p(dx,dy,2,2,'#67e8f9');
    });
  }
};

// ── BATCH AUCTIONEER TOWER ──
sprites['tower_batch'] = {
  label: 'Tower: Batch',
  desc: '128×32 · 4 frames (idle pulse)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const pulse = [0,1,2,1][f];

    const p = (x,y,w,h,c) => px(ctx, ox+x, y, w, h, c);

    // BASE
    p(6, 26, 20, 6, '#1e1b4b');
    p(4, 28, 24, 4, '#312e81');
    p(3, 30, 26, 2, '#4338ca');

    // TOWER BODY
    p(8, 12, 16, 16, '#1e1b4b');
    p(10, 14, 12, 12, '#312e81');
    // windows/screens
    p(11, 15, 4, 4, '#0f0a1f');
    p(17, 15, 4, 4, '#0f0a1f');
    p(11, 21, 4, 4, '#0f0a1f');
    p(17, 21, 4, 4, '#0f0a1f');
    // screen glow
    const sc = ['#8b5cf6','#6d28d9','#a78bfa','#8b5cf6'][f];
    p(12, 16, 2, 2, sc);
    p(18, 16, 2, 2, sc);
    p(12, 22, 2, 2, sc);
    p(18, 22, 2, 2, sc);

    // TOP
    p(9, 8, 14, 6, '#312e81');
    p(11, 6, 10, 4, '#4338ca');

    // ANTENNA with pulsing tip
    p(15, 0, 2, 8, '#312e81');
    const tipColors = ['#8b5cf6','#a78bfa','#c4b5fd','#a78bfa'];
    p(14, -2+pulse, 4, 4, tipColors[f]);

    // RANGE RING (top-down arc)
    ctx.globalAlpha = 0.3 + pulse*0.1;
    ctx.strokeStyle = '#8b5cf6';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(ox+16, 20, 12+pulse, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
};

// ── COW MATCHER TOWER ──
sprites['tower_cow'] = {
  label: 'Tower: CoW',
  desc: '128×32 · 4 frames',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const matchPulse = f===1||f===3;

    const p = (x,y,w,h,c) => px(ctx, ox+x, y, w, h, c);

    // BASE
    p(5, 26, 22, 6, '#052e16');
    p(3, 28, 26, 4, '#14532d');
    p(2, 30, 28, 2, '#15803d');

    // BODY
    p(8, 10, 16, 18, '#052e16');
    p(10, 12, 12, 14, '#14532d');
    // COW SPOTS on tower body
    p(11, 14, 4, 4, '#f5f0e8');
    p(17, 18, 4, 3, '#f5f0e8');
    p(12, 21, 3, 3, '#1a1a2a');

    // TOP / HEAD of tower
    p(8, 5, 16, 7, '#052e16');
    p(10, 6, 12, 5, '#166534');
    // HORNS on tower
    p(7, 5, 4, 2, '#d97706');
    p(5, 3, 4, 4, '#d97706');
    p(21, 5, 4, 2, '#d97706');
    p(23, 3, 4, 4, '#d97706');

    // MATCH beam (when active)
    if(matchPulse) {
      ctx.globalAlpha=0.7;
      ctx.strokeStyle='#10b981';
      ctx.lineWidth=1;
      ctx.setLineDash([2,2]);
      ctx.beginPath();
      ctx.moveTo(ox+16, 10);
      ctx.bezierCurveTo(ox+4, 0, ox+28, 0, ox+16, 10);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha=1;
    }

    // TOP dot
    p(14, 1, 4, 4, matchPulse?'#34d399':'#10b981');
  }
};

// ── DARK POOL TOWER ──
sprites['tower_dark'] = {
  label: 'Tower: Dark Pool',
  desc: '128×32 · 4 frames',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const cloakAnim = f;

    const p = (x,y,w,h,c) => px(ctx, ox+x, y, w, h, c);

    // BASE
    p(5, 26, 22, 6, '#0c1a2e');
    p(3, 28, 26, 4, '#1e3a5f');
    p(2, 30, 28, 2, '#1d4ed8');

    // BODY (dark, shadowy)
    p(8, 8, 16, 20, '#0c1a2e');
    p(10, 10, 12, 16, '#1e3a5f');
    // cloak edge animation
    for(let i=0;i<4;i++){
      const offset = (i+cloakAnim)%4;
      p(8, 10+i*4, 2, 2+offset, '#0c1a2e');
      p(22, 10+i*4, 2, 2+offset, '#0c1a2e');
    }

    // Cloak dots (hidden tx visual)
    const vis = f%2===0;
    ctx.globalAlpha = vis?0.6:0.2;
    p(12, 14, 2, 2, '#3b82f6');
    p(17, 17, 2, 2, '#3b82f6');
    p(13, 20, 2, 2, '#3b82f6');
    ctx.globalAlpha=1;

    // TOP
    p(10, 4, 12, 6, '#0c1a2e');
    p(12, 2, 8, 4, '#1e3a5f');

    // ANTENNA
    p(15, -2, 2, 6, '#1e3a5f');
    const pulseC = ['#1d4ed8','#2563eb','#3b82f6','#2563eb'][f];
    p(13, -4, 6, 4, pulseC);
  }
};

// ── TRANSACTION (flowing coin) ──
sprites['transaction'] = {
  label: 'Transaction TX',
  desc: '128×32 · 4 frames (spin)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const widths = [14,8,14,8];
    const w2 = widths[f];
    const cx = 16, cy = 16;
    const status = ['safe','safe','risk','safe'][f];
    const mainC = status==='safe'?'#10b981':'#f59e0b';
    const lightC = status==='safe'?'#34d399':'#fbbf24';

    // Glow ring
    ctx.globalAlpha=0.25;
    ctx.fillStyle=mainC;
    ctx.beginPath();
    ctx.arc(ox+cx,cy,10,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;

    // Coin body (fake spin via width)
    px(ctx, ox+cx-w2/2, cy-7, w2, 14, '#064e3b');
    px(ctx, ox+cx-w2/2+1, cy-6, Math.max(1,w2-2), 12, mainC);
    // Shine
    if(w2>8) {
      px(ctx, ox+cx-w2/2+2, cy-5, 3, 5, lightC);
    }

    // ETH symbol in center
    ctx.fillStyle='#022c22';
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';
    if(w2>8) ctx.fillText('Ξ', ox+cx+1, cy+4);
    ctx.textAlign='left';

    // Value label
    ctx.fillStyle=lightC;
    ctx.font='6px monospace';
    ctx.textAlign='center';
    ctx.fillText('TX', ox+cx, cy+16);
    ctx.textAlign='left';
  }
};

// ── SLASH EFFECT ──
sprites['slash_effect'] = {
  label: 'Slash Effect',
  desc: '128×32 · 4 frames (arc)',
  frames: 4,
  draw(ctx, frame, ox) {
    const f = frame;
    const progress = f/3;
    const alpha = [0.9,0.7,0.4,0.1][f];

    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#fde68a';
    ctx.lineWidth=3;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(ox+2, 28-f*4);
    ctx.quadraticCurveTo(ox+16, 12, ox+30, 8+f*5);
    ctx.stroke();

    ctx.strokeStyle='#ffffff';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(ox+3, 27-f*4);
    ctx.quadraticCurveTo(ox+16, 13, ox+29, 9+f*5);
    ctx.stroke();
    ctx.globalAlpha=1;

    // Sparkles
    if(f<3) {
      ctx.fillStyle='#fef3c7';
      [[4,24],[16,12],[28,10]].forEach(([sx,sy],i)=>{
        if(i<=f){
          ctx.globalAlpha=alpha;
          ctx.fillRect(ox+sx-1,sy-1,3,3);
        }
      });
      ctx.globalAlpha=1;
    }
  }
};

// ── PROJECTILE ──
sprites['projectile'] = {
  label: 'Projectile',
  desc: '128×32 · 4 frames · 5 types',
  frames: 4,
  draw(ctx, frame, ox) {
    // 4 projectile types side by side
    const types = [
      {c:'#8b5cf6', name:'BA'},
      {c:'#10b981', name:'CW'},
      {c:'#f59e0b', name:'SV'},
      {c:'#3b82f6', name:'DP'},
    ];
    const t2 = types[frame];
    const cy = 16;
    // Trail
    ctx.globalAlpha=0.3;
    px(ctx, ox+2, cy-1, 14, 3, t2.c);
    ctx.globalAlpha=0.15;
    px(ctx, ox+2, cy-2, 10, 5, t2.c);
    ctx.globalAlpha=1;
    // Head
    px(ctx, ox+18, cy-3, 8, 7, t2.c);
    px(ctx, ox+22, cy-1, 4, 3, '#ffffff');
    // tip
    px(ctx, ox+26, cy, 4, 2, t2.c+'cc');
  }
};

// ────────────────────────────────────────────
// RENDER ALL SPRITES
// ────────────────────────────────────────────

function buildSpriteSheet(key, def) {
  const FRAME_W = 32, FRAME_H = 32;
  const frames = def.frames;
  const sheet = makeCanvas(FRAME_W * frames, FRAME_H);
  const sctx = sheet.getContext('2d');
  sctx.imageSmoothingEnabled = false;

  for(let f=0;f<frames;f++){
    def.draw(sctx, f, f*FRAME_W);
  }

  return sheet;
}

function buildCard(key, def) {
  const sheet = buildSpriteSheet(key, def);

  const card = document.createElement('div');
  card.className = 'card';

  const title = document.createElement('h3');
  title.textContent = def.label;
  card.appendChild(title);

  // Preview at SCALE
  const preview = document.createElement('canvas');
  preview.width = sheet.width * SCALE;
  preview.height = sheet.height * SCALE;
  preview.style.imageRendering = 'pixelated';
  preview.style.border = '1px solid #2d1b60';
  preview.style.borderRadius = '4px';
  preview.style.background = '#000';
  const pctx = preview.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  pctx.drawImage(sheet, 0, 0, preview.width, preview.height);
  card.appendChild(preview);

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = def.desc;
  card.appendChild(meta);

  const btn = document.createElement('button');
  btn.textContent = '⬇ PNG';
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = `cowswap_${key}.png`;
    link.href = sheet.toDataURL('image/png');
    link.click();
  };
  card.appendChild(btn);

  // Animate preview
  let frame = 0;
  setInterval(() => {
    frame = (frame+1) % def.frames;
    const animSheet = makeCanvas(32*def.frames, 32);
    const asctx = animSheet.getContext('2d');
    asctx.fillStyle='#000';
    asctx.fillRect(0,0,animSheet.width,animSheet.height);
    for(let f=0;f<def.frames;f++) def.draw(asctx,f,f*32);

    pctx.clearRect(0,0,preview.width,preview.height);
    pctx.fillStyle='#000';
    pctx.fillRect(0,0,preview.width,preview.height);
    // Highlight current frame
    pctx.fillStyle='#ffffff08';
    pctx.fillRect(frame*32*SCALE, 0, 32*SCALE, 32*SCALE);
    pctx.drawImage(animSheet, 0,0,preview.width,preview.height);
    // Current frame indicator
    pctx.fillStyle='#ffffff33';
    pctx.fillRect(frame*32*SCALE, preview.height-4, 32*SCALE, 4);
  }, 200);

  return card;
}

// BUILD UI
const sheets = document.getElementById('sheets');

const sections = [
  { title:'Player', keys:['sir_mooington'] },
  { title:'Enemies', keys:['frontrunner','sandwich_bot','backrunner','jit_lp'] },
  { title:'Towers', keys:['tower_batch','tower_cow','tower_dark'] },
  { title:'Effects', keys:['transaction','slash_effect','projectile'] },
];

sections.forEach(sec => {
  const section = document.createElement('div');
  section.className = 'sheet-section';
  const h2 = document.createElement('h2');
  h2.textContent = sec.title.toUpperCase();
  section.appendChild(h2);
  const grid = document.createElement('div');
  grid.className = 'grid';
  sec.keys.forEach(key => {
    if(sprites[key]) grid.appendChild(buildCard(key, sprites[key]));
  });
  section.appendChild(grid);
  sheets.appendChild(section);
});

// ── DOWNLOAD ALL ──
function downloadAll() {
  Object.entries(sprites).forEach(([key, def], i) => {
    setTimeout(() => {
      const sheet = buildSpriteSheet(key, def);
      const link = document.createElement('a');
      link.download = `cowswap_${key}.png`;
      link.href = sheet.toDataURL('image/png');
      link.click();
    }, i * 300);
  });
}
