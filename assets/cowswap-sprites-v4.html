<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CowSwap Sprites v4 — Padded Glow</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#08060f; color:#f0f0ff; font-family:monospace; padding:24px; }
  h1 { color:#a78bfa; font-size:12px; letter-spacing:3px; margin-bottom:4px; }
  .sub { font-size:9px; color:#444; margin-bottom:20px; letter-spacing:1px; }
  .section { margin-bottom:32px; }
  .section-title { font-size:9px; color:#f59e0b; letter-spacing:3px; border-bottom:1px solid #2d1b60; padding-bottom:6px; margin-bottom:14px; }
  .grid { display:flex; flex-wrap:wrap; gap:16px; }
  .card { background:#0d0a22; border:1px solid #2d1b60; border-radius:8px; padding:12px 14px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .card h3 { font-size:9px; color:#a78bfa; letter-spacing:1px; }
  canvas { image-rendering:pixelated; border-radius:4px; }
  .checker {
    background-image:
      linear-gradient(45deg,#1a1a2e 25%,transparent 25%),
      linear-gradient(-45deg,#1a1a2e 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,#1a1a2e 75%),
      linear-gradient(-45deg,transparent 75%,#1a1a2e 75%);
    background-size:10px 10px;
    background-position:0 0,0 5px,5px -5px,-5px 0;
    background-color:#111122;
  }
  button { background:#1a0a3a; color:#a78bfa; border:1px solid #4c1d95; padding:5px 12px; border-radius:4px; cursor:pointer; font-family:monospace; font-size:9px; letter-spacing:1px; width:100%; }
  button:hover { background:#2d1b60; }
  .dl-all { background:#2d1265; color:#e0d0ff; border:1px solid #7c3aed; padding:9px 24px; border-radius:6px; cursor:pointer; font-family:monospace; font-size:10px; letter-spacing:2px; margin-bottom:22px; display:inline-block; }
  .dl-all:hover { background:#4c1d95; }
  .tag { font-size:8px; color:#444; }
</style>
</head>
<body>
<h1>⚔ COWSWAP SPRITES v4 — GLOW PADDED</h1>
<p class="sub">Transparent · No borders · Full glow visible on all sides · PNG</p>
<button class="dl-all" onclick="downloadAll()">⬇ DOWNLOAD ALL</button>
<div id="root"></div>

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
// All "logical" sprite content sits in an inner box.
// PAD pixels of transparent space surround it on every side so shadowBlur never clips.
const PAD = 20;        // glow margin — must be >= max shadowBlur used

// Tower inner content area: 64×88
const TW = 64, TH = 88;
// Tower canvas (with padding): TW+PAD*2 × TH+PAD*2
const TCW = TW + PAD*2, TCH = TH + PAD*2;

// TX token inner content: 40×48
const XW = 40, XH = 48;
const XCW = XW + PAD*2, XCH = XH + PAD*2;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function make(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return c; }

function glow(ctx,color,blur,fn){
  ctx.shadowColor=color; ctx.shadowBlur=blur; fn();
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
}
function rrect(ctx,x,y,w,h,r,fill,stroke,sw){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill; ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=sw||1.5; ctx.stroke();}
}
function circ(ctx,x,y,r,fill,stroke,sw){
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill; ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=sw||1.5; ctx.stroke();}
}
function lbl(ctx,text,x,y,size,color){
  ctx.fillStyle=color;
  ctx.font=`bold ${size}px "Courier New",monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ─── TOWER DEFINITIONS ───────────────────────────────────────────────────────
const towers=[
  {key:'tower_ba', name:'Batch\nAuctioneer',abbr:'BA',
   bodyC:'#1a0845',bandC:'#8b5cf6',bandL:'#c4b5fd',glowC:'#8b5cf6',bordC:'#6d28d9',antC:'#ddd6fe',big:false},
  {key:'tower_sg', name:'Slippage\nGuard',  abbr:'SG',
   bodyC:'#200830',bandC:'#ec4899',bandL:'#f9a8d4',glowC:'#ec4899',bordC:'#be185d',antC:'#fce7f3',big:false},
  {key:'tower_slv',name:'Solver',            abbr:'SLV',
   bodyC:'#161000',bandC:'#f59e0b',bandL:'#fde68a',glowC:'#f59e0b',bordC:'#b45309',antC:'#fef9c3',big:true},
  {key:'tower_dp', name:'Dark Pool\nNode',   abbr:'DP',
   bodyC:'#001020',bandC:'#3b82f6',bandL:'#93c5fd',glowC:'#3b82f6',bordC:'#1d4ed8',antC:'#dbeafe',big:false},
  {key:'tower_cow',name:'CoW\nMatcher',      abbr:'CoW',
   bodyC:'#031a0f',bandC:'#10b981',bandL:'#6ee7b7',glowC:'#10b981',bordC:'#047857',antC:'#d1fae5',big:false},
];

// ─── DRAW TOWER ───────────────────────────────────────────────────────────────
// Draws into a TCW×TCH canvas. All content shifted by PAD so glow has room.
// Inner layout (0,0 = logical origin, PAD,PAD = canvas origin):
//   y=0  antenna tip
//   y=12 body top
//   y=12+bh body bottom
//   y=12+bh+6 platform bottom
//   y=12+bh+22 name bottom  → TH=88 comfortably fits
function drawTower(tower,frame){
  const c=make(TCW,TCH);
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  // Offset all drawing by PAD
  ctx.translate(PAD,PAD);

  const pulse=[0,1,2,1][frame%4];
  const big=tower.big;
  const bw=big?42:34, bh=big?42:34;
  const bx=(TW-bw)/2, by=14;
  const br=5;

  // ── RANGE RING ──
  ctx.globalAlpha=0.07+pulse*0.015;
  circ(ctx,TW/2,by+bh/2+6,(big?28:22)+pulse,tower.glowC);
  ctx.globalAlpha=0.03;
  circ(ctx,TW/2,by+bh/2+6,(big?36:30)+pulse,tower.glowC);
  ctx.globalAlpha=1;

  // ── BODY ──
  glow(ctx,tower.glowC,14+pulse*3,()=>{
    rrect(ctx,bx,by,bw,bh,br,tower.bodyC,tower.bordC,1.5);
  });
  // Inner highlight
  ctx.globalAlpha=0.12;
  rrect(ctx,bx+3,by+3,bw-6,5,[3,3,0,0],'#ffffff');
  ctx.globalAlpha=1;

  // ── TOP BAND ──
  const bandH=big?18:15;
  glow(ctx,tower.bandC,10+pulse*2,()=>{
    rrect(ctx,bx,by,bw,bandH,[br,br,0,0],tower.bandC,tower.bordC,1.5);
  });
  ctx.globalAlpha=0.35;
  rrect(ctx,bx+4,by+3,bw-8,3,[2,2,0,0],'#ffffff');
  ctx.globalAlpha=1;

  // ── ABBR LABEL ──
  const fs=big?(tower.abbr.length>2?11:14):(tower.abbr.length>2?9:12);
  glow(ctx,tower.bandC,10+pulse*3,()=>{
    lbl(ctx,tower.abbr,TW/2,by+bandH/2,fs,'#ffffff');
  });

  // ── BODY DETAILS ──
  const dotY=by+bandH+8;
  [0,1,2].forEach(i=>{
    ctx.globalAlpha=(frame+i)%3===0?0.9:0.25;
    circ(ctx,bx+8+i*7,dotY,2.5,tower.bandC);
  });
  ctx.globalAlpha=1;

  // Side LED
  ctx.globalAlpha=0.45+pulse*0.15;
  ctx.fillStyle=tower.bandC;
  ctx.fillRect(bx+bw-5,by+bandH+6,3,bh-bandH-12);
  ctx.globalAlpha=1;

  // ── PLATFORM ──
  const platW=bw+12, platX=(TW-platW)/2, platY=by+bh;
  glow(ctx,tower.glowC,6,()=>{
    rrect(ctx,platX,platY,platW,7,[0,0,4,4],'#0d0820',tower.bordC+'aa',1);
  });
  ctx.globalAlpha=0.2;
  ctx.fillStyle='#000000';
  ctx.fillRect(platX+2,platY+5,platW-4,2);
  ctx.globalAlpha=1;

  // ── ANTENNA ──
  const antX=TW/2;
  const antTipY=2;     // logical y=2 → canvas y=PAD+2=22 — plenty of room
  const antBaseY=by-1;
  ctx.strokeStyle=tower.bordC;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(antX,antBaseY);
  ctx.lineTo(antX,antTipY+6);
  ctx.stroke();

  // Tip dot — biggest glow user, PAD=20 fully contains shadowBlur=18
  glow(ctx,tower.antC,16+pulse*4,()=>{
    circ(ctx,antX,antTipY,5+(pulse===2?1:0),tower.antC);
  });
  circ(ctx,antX,antTipY,2+(pulse===2?0.5:0),'#ffffff');

  // ── NAME LABEL ──
  tower.name.split('\n').forEach((line,i)=>{
    ctx.fillStyle=tower.bandL;
    ctx.globalAlpha=0.85;
    ctx.font='5.5px "Courier New",monospace';
    ctx.textAlign='center';
    ctx.fillText(line,TW/2,platY+11+i*9);
  });
  ctx.textAlign='left';
  ctx.globalAlpha=1;

  // Reset transform
  ctx.setTransform(1,0,0,1,0,0);
  return c;
}

// ─── TX TOKEN DEFINITIONS ────────────────────────────────────────────────────
const txTokens=[
  {key:'tx_eth', abbr:'Ξ', label:'ETH', bodyC:'#0e0e30',bandC:'#627eea',bandL:'#a5b4fc',glowC:'#627eea',bordC:'#4f46e5'},
  {key:'tx_usdt',abbr:'₮', label:'USDT',bodyC:'#001a0f',bandC:'#26a17b',bandL:'#6ee7b7',glowC:'#26a17b',bordC:'#059669'},
  {key:'tx_usdc',abbr:'$', label:'USDC',bodyC:'#001228',bandC:'#2775ca',bandL:'#93c5fd',glowC:'#2775ca',bordC:'#1d4ed8'},
  {key:'tx_cow', abbr:'🐄',label:'COW', bodyC:'#100630',bandC:'#8b5cf6',bandL:'#c4b5fd',glowC:'#8b5cf6',bordC:'#6d28d9'},
  {key:'tx_dai', abbr:'D', label:'DAI', bodyC:'#180e00',bandC:'#f5ac37',bandL:'#fde68a',glowC:'#f5ac37',bordC:'#d97706'},
  {key:'tx_wbtc',abbr:'₿', label:'WBTC',bodyC:'#1a0800',bandC:'#f7931a',bandL:'#fed7aa',glowC:'#f7931a',bordC:'#c2410c'},
];
const TX_STATUS=[
  null,
  {tint:'#f97316',bordC:'#ea580c',badge:'!'},
  {tint:'#ef4444',bordC:'#b91c1c',badge:'X'},
  {tint:'#10b981',bordC:'#047857',badge:'S'},
  {tint:'#8b5cf6',bordC:'#5b21b6',badge:'#'},
];
const SPIN_W=[24,15,4,15];

// ─── DRAW TX TOKEN ────────────────────────────────────────────────────────────
// Inner coin area: XW×XH (40×48). Padded canvas: XCW×XCH.
function drawTx(token,frame){
  const c=make(XCW,XCH);
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.translate(PAD,PAD);

  const isStatus=frame>=4;
  const spinF=isStatus?0:frame;
  const status=isStatus?TX_STATUS[frame-3]:null;
  const coinW=SPIN_W[spinF];
  const coinH=28;
  const cx=XW/2, cy=XH/2-2;
  const coinX=cx-coinW/2, coinY=cy-coinH/2;
  const br=Math.min(5,coinW/3);
  const mainC=status?status.tint:token.bandC;
  const bordC=status?status.bordC:token.bordC;

  // ── OUTER GLOW ──
  ctx.globalAlpha=0.18;
  glow(ctx,mainC,16,()=>{
    ctx.fillStyle=mainC;
    ctx.beginPath();
    ctx.ellipse(cx,cy,coinW/2+6,coinH/2+6,0,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;

  if(coinW<4){
    glow(ctx,mainC,8,()=>{
      ctx.fillStyle=mainC; ctx.fillRect(cx-1,coinY,2,coinH);
    });
    ctx.setTransform(1,0,0,1,0,0); return c;
  }

  // ── EDGE ──
  ctx.globalAlpha=0.5;
  rrect(ctx,coinX+2,coinY+2,coinW,coinH,br,bordC+'66');
  ctx.globalAlpha=1;

  // ── BODY ──
  glow(ctx,mainC,10,()=>{
    rrect(ctx,coinX,coinY,coinW,coinH,br,token.bodyC,bordC,1.5);
  });

  // ── TOP BAND ──
  const bandH=11;
  if(coinW>=8){
    glow(ctx,mainC,7,()=>{
      rrect(ctx,coinX,coinY,coinW,bandH,[br,br,0,0],mainC,bordC,1.5);
    });
    ctx.globalAlpha=0.3;
    rrect(ctx,coinX+3,coinY+2,Math.max(2,coinW-6),3,[2,2,0,0],'#ffffff');
    ctx.globalAlpha=1;
    const symFS=coinW>=18?9:6;
    glow(ctx,'#fff',5,()=>{ lbl(ctx,token.abbr==='🐄'?'🐄':token.abbr,cx,coinY+bandH/2,symFS,'#ffffff'); });
  }

  // ── TX LABEL ──
  if(coinW>=16) lbl(ctx,'TX',cx,coinY+bandH+(coinH-bandH)/2,8,mainC+'bb');

  // ── GLINT ──
  if(coinW>=12){
    ctx.globalAlpha=0.4;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.ellipse(coinX+coinW*0.28,coinY+3,coinW*0.14,2,-0.3,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── STATUS BADGE ──
  if(status){
    const bx=coinX+coinW+2, by2=coinY-2;
    glow(ctx,mainC,10,()=>{ circ(ctx,bx,by2,7,mainC); });
    circ(ctx,bx,by2,7,mainC);
    lbl(ctx,status.badge,bx,by2,6,'#fff');
  }

  // ── CRACK ──
  if(status&&status.badge==='X'&&coinW>=8){
    ctx.globalAlpha=0.65;
    ctx.strokeStyle='#ff000099'; ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx-1,coinY+2); ctx.lineTo(cx+2,cy); ctx.lineTo(cx-1,coinY+coinH-2);
    ctx.stroke();
    ctx.globalAlpha=1;
  }

  // ── LABEL BELOW ──
  ctx.fillStyle=mainC; ctx.globalAlpha=0.85;
  ctx.font='5px "Courier New",monospace'; ctx.textAlign='center';
  ctx.fillText(token.label,cx,coinY+coinH+9);
  ctx.textAlign='left'; ctx.globalAlpha=1;

  ctx.setTransform(1,0,0,1,0,0);
  return c;
}

// ─── SHEET BUILDERS ───────────────────────────────────────────────────────────
function buildTowerSheet(tower){
  const FRAMES=4;
  const sheet=make(TCW*FRAMES,TCH);
  const ctx=sheet.getContext('2d'); ctx.imageSmoothingEnabled=false;
  for(let f=0;f<FRAMES;f++) ctx.drawImage(drawTower(tower,f),f*TCW,0);
  return sheet;
}
function buildTxSheet(token){
  const FRAMES=8;
  const sheet=make(XCW*FRAMES,XCH);
  const ctx=sheet.getContext('2d'); ctx.imageSmoothingEnabled=false;
  for(let f=0;f<FRAMES;f++) ctx.drawImage(drawTx(token,f),f*XCW,0);
  return sheet;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function addChecker(c){ c.className='checker'; return c; }
function dl(canvas,name){ const a=document.createElement('a'); a.download=name+'.png'; a.href=canvas.toDataURL('image/png'); a.click(); }

function buildTowerCard(tower){
  const card=document.createElement('div'); card.className='card';
  const h3=document.createElement('h3'); h3.textContent=tower.abbr+' — '+tower.name.replace('\n',' '); card.appendChild(h3);

  const sheet=buildTowerSheet(tower);
  const sp=make(sheet.width*2,sheet.height*2); addChecker(sp); sp.style.border='1px solid #2d1b60';
  const sc=sp.getContext('2d'); sc.imageSmoothingEnabled=false; sc.drawImage(sheet,0,0,sp.width,sp.height);
  card.appendChild(sp);

  const anim=make(TCW*3,TCH*3); addChecker(anim); anim.style.border='1px solid #3d2080';
  const ac=anim.getContext('2d'); ac.imageSmoothingEnabled=false;
  let af=0;
  setInterval(()=>{ af=(af+1)%4; ac.clearRect(0,0,anim.width,anim.height); ac.drawImage(drawTower(tower,af),0,0,anim.width,anim.height); },250);
  ac.drawImage(drawTower(tower,0),0,0,anim.width,anim.height);
  card.appendChild(anim);

  const t=document.createElement('div'); t.className='tag';
  t.textContent=`${TCW*4}×${TCH}px · 4 frames · PAD=${PAD}px · transparent`;
  card.appendChild(t);
  const btn=document.createElement('button'); btn.textContent=`⬇ ${tower.key}.png`; btn.onclick=()=>dl(buildTowerSheet(tower),tower.key); card.appendChild(btn);
  return card;
}

function buildTxCard(token){
  const card=document.createElement('div'); card.className='card';
  const h3=document.createElement('h3'); h3.textContent=token.label; card.appendChild(h3);

  const sheet=buildTxSheet(token);
  const sp=make(sheet.width*3,sheet.height*3); addChecker(sp); sp.style.border='1px solid #2d1b60';
  const sc=sp.getContext('2d'); sc.imageSmoothingEnabled=false; sc.drawImage(sheet,0,0,sp.width,sp.height);
  card.appendChild(sp);

  const anim=make(XCW*4,XCH*4); addChecker(anim); anim.style.border='1px solid #3d2080';
  const ac=anim.getContext('2d'); ac.imageSmoothingEnabled=false;
  let af=0;
  setInterval(()=>{ af=(af+1)%8; ac.clearRect(0,0,anim.width,anim.height); ac.drawImage(drawTx(token,af),0,0,anim.width,anim.height); },180);
  ac.drawImage(drawTx(token,0),0,0,anim.width,anim.height);
  card.appendChild(anim);

  const t=document.createElement('div'); t.className='tag';
  t.textContent=`${XCW*8}×${XCH}px · 8 frames · PAD=${PAD}px · transparent`;
  card.appendChild(t);
  const btn=document.createElement('button'); btn.textContent=`⬇ ${token.key}.png`; btn.onclick=()=>dl(buildTxSheet(token),token.key); card.appendChild(btn);
  return card;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const root=document.getElementById('root');
function section(title,cards){
  const s=document.createElement('div'); s.className='section';
  const tt=document.createElement('div'); tt.className='section-title'; tt.textContent=title; s.appendChild(tt);
  const g=document.createElement('div'); g.className='grid'; cards.forEach(c=>g.appendChild(c)); s.appendChild(g);
  root.appendChild(s);
}
section('TOWERS',towers.map(buildTowerCard));
section('TX TOKENS',txTokens.map(buildTxCard));

// ── COMBINED ──
const combSec=document.createElement('div'); combSec.className='section';
const ct=document.createElement('div'); ct.className='section-title'; ct.textContent='COMBINED SHEETS'; combSec.appendChild(ct);

const tc=make(TCW*4,TCH*towers.length);
const tcc=tc.getContext('2d'); tcc.imageSmoothingEnabled=false;
towers.forEach((t,i)=>tcc.drawImage(buildTowerSheet(t),0,i*TCH));
const tcp=make(tc.width*2,tc.height*2); addChecker(tcp);
tcp.style.cssText='display:block;margin-bottom:10px;border:1px solid #2d1b60;border-radius:4px;';
const tcpc=tcp.getContext('2d'); tcpc.imageSmoothingEnabled=false; tcpc.drawImage(tc,0,0,tcp.width,tcp.height);
combSec.appendChild(tcp);
const tBtn=document.createElement('button'); tBtn.className='dl-all'; tBtn.style.cssText='font-size:9px;padding:7px 16px;';
tBtn.textContent='⬇ cowswap_towers_sheet.png'; tBtn.onclick=()=>dl(tc,'cowswap_towers_sheet'); combSec.appendChild(tBtn);

const xc=make(XCW*8,XCH*txTokens.length);
const xcc=xc.getContext('2d'); xcc.imageSmoothingEnabled=false;
txTokens.forEach((t,i)=>xcc.drawImage(buildTxSheet(t),0,i*XCH));
const xp=make(xc.width*3,xc.height*3); addChecker(xp);
xp.style.cssText='display:block;margin:16px 0 10px;border:1px solid #2d1b60;border-radius:4px;';
const xpc=xp.getContext('2d'); xpc.imageSmoothingEnabled=false; xpc.drawImage(xc,0,0,xp.width,xp.height);
combSec.appendChild(xp);
const xBtn=document.createElement('button'); xBtn.className='dl-all'; xBtn.style.cssText='font-size:9px;padding:7px 16px;';
xBtn.textContent='⬇ cowswap_tokens_sheet.png'; xBtn.onclick=()=>dl(xc,'cowswap_tokens_sheet'); combSec.appendChild(xBtn);

root.appendChild(combSec);

// ── BEVY INFO ──
const info=document.createElement('pre');
info.style.cssText='background:#0d0a22;border:1px solid #2d1b60;border-radius:6px;padding:14px;font-size:9px;color:#a78bfa;line-height:1.8;margin-top:8px;white-space:pre-wrap;';
info.textContent=`// Each frame includes ${PAD}px transparent padding on ALL sides for glow.
// Account for this offset when positioning sprites in Bevy.

// Tower frame size (with padding): ${TCW}×${TCH}px
// Tower inner content:              ${TW}×${TH}px  (offset ${PAD}px from edges)
TextureAtlasLayout::from_grid(UVec2::new(${TCW}, ${TCH}), 4, ${towers.length}, None, None)
// Row 0=BA  1=SG  2=SLV  3=DP  4=CoW

// Token frame size (with padding):  ${XCW}×${XCH}px
// Token inner content:               ${XW}×${XH}px  (offset ${PAD}px from edges)
TextureAtlasLayout::from_grid(UVec2::new(${XCW}, ${XCH}), 8, ${txTokens.length}, None, None)
// Row 0=ETH 1=USDT 2=USDC 3=COW 4=DAI 5=WBTC
// Col 0-3: spin  4: risk  5: captured  6: immune  7: in-batch`;
root.appendChild(info);

function downloadAll(){
  towers.forEach((t,i)=>setTimeout(()=>dl(buildTowerSheet(t),t.key),i*300));
  txTokens.forEach((t,i)=>setTimeout(()=>dl(buildTxSheet(t),t.key),(towers.length+i)*300+200));
  setTimeout(()=>dl(tc,'cowswap_towers_sheet'),(towers.length+txTokens.length)*300+600);
  setTimeout(()=>dl(xc,'cowswap_tokens_sheet'),(towers.length+txTokens.length)*300+900);
}
</script>
</body>
</html>
