<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CowSwap TX Token Sprites</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0814; color:#f0f0ff; font-family:monospace; padding:24px; }
  h1 { color:#a78bfa; font-size:13px; letter-spacing:3px; margin-bottom:6px; }
  .sub { font-size:9px; color:#555; margin-bottom:20px; letter-spacing:1px; }
  .grid { display:flex; flex-wrap:wrap; gap:20px; margin-bottom:28px; }
  .card {
    background:#0f0a28; border:1px solid #2d1b60; border-radius:8px;
    padding:14px 16px; display:flex; flex-direction:column; align-items:center; gap:10px;
    min-width:200px;
  }
  .card h3 { font-size:10px; color:#a78bfa; letter-spacing:2px; }
  .tag { font-size:8px; color:#555; letter-spacing:1px; }
  canvas { image-rendering:pixelated; border:1px solid #2d1b60; border-radius:4px; background:#000; }
  button {
    background:#1e1040; color:#a78bfa; border:1px solid #4c1d95;
    padding:6px 16px; border-radius:4px; cursor:pointer; font-family:monospace;
    font-size:9px; letter-spacing:1px; width:100%;
  }
  button:hover { background:#2d1b60; }
  .all-btn {
    background:#3b0764; color:#e0d0ff; border:1px solid #7c3aed;
    padding:10px 28px; border-radius:6px; cursor:pointer; font-family:monospace;
    font-size:11px; letter-spacing:2px; margin-bottom:22px; display:block;
  }
  .all-btn:hover { background:#5b21b6; }
  .frame-strip { display:flex; gap:4px; align-items:center; }
  .frame-num { font-size:8px; color:#333; width:16px; text-align:center; }
</style>
</head>
<body>

<h1>⬡ COWSWAP — TX TOKEN SPRITES</h1>
<p class="sub">32×32px pixel art · 8 frames per token (4 spin + 4 status variants) · PNG export</p>

<button class="all-btn" onclick="downloadAll()">⬇ DOWNLOAD ALL TOKEN SPRITES</button>

<div id="root"></div>

<script>
const FRAME_W = 32;
const FRAME_H = 32;
const FRAMES  = 8; // 4 spin + 4 status (safe/risk/captured/immune)
const SCALE   = 7;

// ─── TOKEN DEFINITIONS ───────────────────────────────────────────────────────

const tokens = [

  // ── ETH ──
  {
    key: 'tx_eth',
    label: 'ETH',
    name: 'Ethereum',
    // coin colors: [dark bg, main, light, ultra-light, symbol-dark]
    colors: { bg:'#1c1033', main:'#627eea', light:'#8ca0ef', shine:'#b8c8f8', dark:'#3d5bc7', sym:'#1a2a7a', symL:'#9cb0ff' },
    symbol: 'Ξ',
    symbolSize: 9,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, this.symbol, this.symbolSize, drawEthInner); }
  },

  // ── USDT ──
  {
    key: 'tx_usdt',
    label: 'USDT',
    name: 'Tether',
    colors: { bg:'#003322', main:'#26a17b', light:'#3abf93', shine:'#6bd9b4', dark:'#1a7a5a', sym:'#0a3322', symL:'#7fffd0' },
    symbol: '$',
    symbolSize: 10,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, this.symbol, this.symbolSize, drawUsdtInner); }
  },

  // ── USDC ──
  {
    key: 'tx_usdc',
    label: 'USDC',
    name: 'USD Coin',
    colors: { bg:'#001840', main:'#2775ca', light:'#4a8fd6', shine:'#80b8f0', dark:'#1a5a9e', sym:'#061840', symL:'#aad4ff' },
    symbol: '$',
    symbolSize: 10,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, this.symbol, this.symbolSize, drawUsdcInner); }
  },

  // ── COW ──
  {
    key: 'tx_cow',
    label: 'COW',
    name: 'CoW Protocol',
    colors: { bg:'#1a0a3a', main:'#8b5cf6', light:'#a78bfa', shine:'#c4b5fd', dark:'#5b21b6', sym:'#2a0a6a', symL:'#ddd6fe' },
    symbol: '🐄',
    symbolSize: 8,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, '🐄', 8, drawCowInner); }
  },

  // ── DAI ──
  {
    key: 'tx_dai',
    label: 'DAI',
    name: 'Dai Stablecoin',
    colors: { bg:'#2a1500', main:'#f5ac37', light:'#f7bf5e', shine:'#fde68a', dark:'#c47d1a', sym:'#3a1800', symL:'#fef3c7' },
    symbol: 'D',
    symbolSize: 10,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, 'D', 10, drawDaiInner); }
  },

  // ── WBTC ──
  {
    key: 'tx_wbtc',
    label: 'WBTC',
    name: 'Wrapped Bitcoin',
    colors: { bg:'#2a1000', main:'#f7931a', light:'#f9a83c', shine:'#fdc56e', dark:'#c06010', sym:'#3a1400', symL:'#fde2b0' },
    symbol: '₿',
    symbolSize: 9,
    draw(ctx, f, ox) { drawCoin(ctx, f, ox, this.colors, '₿', 9, drawWbtcInner); }
  },
];

// ─── STATUS DEFINITIONS ──────────────────────────────────────────────────────
// Frame 0-3 = spin animation (normal/safe)
// Frame 4   = AT RISK  (orange tint + warning indicator)
// Frame 5   = CAPTURED (red tint + crack)
// Frame 6   = IMMUNE   (shield overlay, from CoW batch)
// Frame 7   = IN BATCH (purple glow, grouped)

const STATUS = {
  safe:     { tint: null,      badge: null },
  risk:     { tint: '#ff8c00', badge: '!' },
  captured: { tint: '#cc0000', badge: '✕' },
  immune:   { tint: '#22c55e', badge: '🛡' },
  batch:    { tint: '#8b5cf6', badge: '≡' },
};

// ─── COIN DRAW HELPERS ───────────────────────────────────────────────────────

// Fake horizontal spin via width compression
const SPIN_WIDTHS = [14, 9, 4, 9]; // frames 0-3

function drawCoin(ctx, frame, ox, C, symbol, symSize, innerFn) {
  const isStatus = frame >= 4;
  const spinFrame = isStatus ? 0 : frame;
  const statusIdx = isStatus ? frame - 4 : -1;
  const statusKeys = ['risk','captured','immune','batch'];
  const status = statusIdx >= 0 ? statusKeys[statusIdx] : 'safe';

  const cw = SPIN_WIDTHS[spinFrame]; // coin visual width
  const cx = 16, cy = 16;
  const rx = Math.floor(cw / 2);

  // Tint color from status
  const tintColor = STATUS[status].tint;

  // SHADOW
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(ox + cx, cy + 12, rx + 2, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // GLOW ring
  if(tintColor) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = tintColor;
    ctx.beginPath();
    ctx.ellipse(ox+cx, cy, rx+4, 13, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  } else {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = C.light;
    ctx.beginPath();
    ctx.ellipse(ox+cx, cy, rx+3, 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // COIN EDGE (dark side)
  if(rx > 2) {
    ctx.fillStyle = C.dark;
    ctx.beginPath();
    ctx.ellipse(ox+cx+1, cy+1, rx, 11, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // COIN FACE (main fill)
  const mainFill = tintColor ? blendColor(C.main, tintColor, 0.35) : C.main;
  ctx.fillStyle = mainFill;
  ctx.beginPath();
  ctx.ellipse(ox+cx, cy, Math.max(1,rx), 11, 0, 0, Math.PI*2);
  ctx.fill();

  // COIN INNER (token-specific design)
  if(rx >= 4) {
    innerFn(ctx, ox, cy, rx, C, tintColor);
  }

  // SHINE (top-left glint)
  if(rx >= 5) {
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = C.shine;
    ctx.beginPath();
    ctx.ellipse(ox+cx - Math.floor(rx*0.3), cy - 4, Math.max(1, Math.floor(rx*0.4)), 3, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // STATUS BADGE
  if(status !== 'safe') {
    drawStatusBadge(ctx, ox, cy, status, tintColor);
  }

  // CRACK for captured
  if(status === 'captured' && rx >= 3) {
    ctx.strokeStyle = '#ff000088';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ox+cx-2, cy-6);
    ctx.lineTo(ox+cx+1, cy);
    ctx.lineTo(ox+cx-1, cy+6);
    ctx.stroke();
  }

  // TOKEN LABEL below coin
  ctx.fillStyle = tintColor ? tintColor : C.light;
  ctx.globalAlpha = 0.9;
  ctx.font = '5px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(symbol === '🐄' ? 'COW' : symbol === '₿' ? 'BTC' : symbol === 'Ξ' ? 'ETH' :
               symbol === 'D' ? 'DAI' : symbol, ox + 16, cy + 15);
  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

function drawStatusBadge(ctx, ox, cy, status, tintColor) {
  const bx = ox + 22, by = cy - 10;
  ctx.fillStyle = tintColor || '#22c55e';
  ctx.beginPath();
  ctx.arc(bx, by, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 6px monospace';
  ctx.textAlign = 'center';
  const icons = { risk:'!', captured:'X', immune:'S', batch:'#' };
  ctx.fillText(icons[status] || '?', bx+0.5, by+2);
  ctx.textAlign = 'left';
}

function blendColor(hex1, hex2, t) {
  const r1=parseInt(hex1.slice(1,3),16), g1=parseInt(hex1.slice(3,5),16), b1=parseInt(hex1.slice(5,7),16);
  const r2=parseInt(hex2.slice(1,3),16), g2=parseInt(hex2.slice(3,5),16), b2=parseInt(hex2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t), g=Math.round(g1+(g2-g1)*t), b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

// ─── TOKEN-SPECIFIC INNER DESIGNS ────────────────────────────────────────────

function drawEthInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  // ETH diamond / chevron shape
  if(rx >= 6) {
    // Upper chevron
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.9;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 7);
    ctx.lineTo(cx + Math.min(rx-2, 5), cy - 1);
    ctx.lineTo(cx, cy - 2);
    ctx.lineTo(cx - Math.min(rx-2, 5), cy - 1);
    ctx.closePath();
    ctx.fill();
    // Lower chevron
    ctx.fillStyle = C.light;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(cx, cy + 7);
    ctx.lineTo(cx + Math.min(rx-2, 5), cy + 1);
    ctx.lineTo(cx, cy + 2);
    ctx.lineTo(cx - Math.min(rx-2, 5), cy + 1);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
  } else if(rx >= 3) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-1, cy-5, 2, 10);
    ctx.globalAlpha = 1;
  }
}

function drawUsdtInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  if(rx >= 5) {
    // Tether T shape
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.85;
    // Horizontal bar of T
    ctx.fillRect(cx - Math.min(rx-1,5), cy - 5, Math.min(rx-1,5)*2, 2);
    // Vertical stem
    ctx.fillRect(cx - 1, cy - 4, 2, 9);
    ctx.globalAlpha = 1;
  } else if(rx >= 2) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-1, cy-4, 2, 8);
    ctx.globalAlpha = 1;
  }
}

function drawUsdcInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  if(rx >= 5) {
    // C arc shape
    ctx.strokeStyle = C.symL;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.min(rx-2, 5), -Math.PI*0.3, Math.PI*1.3, false);
    ctx.stroke();
    // close gap
    ctx.strokeStyle = C.main;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, Math.min(rx-2, 5), Math.PI*1.3, -Math.PI*0.3, false);
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else if(rx >= 2) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-1, cy-4, 2, 8);
    ctx.globalAlpha = 1;
  }
}

function drawCowInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  if(rx >= 6) {
    // Tiny pixel cow head
    ctx.fillStyle = '#f5f0e8';
    ctx.globalAlpha = 0.9;
    ctx.fillRect(cx-3, cy-4, 6, 5);
    // spot
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(cx+1, cy-3, 2, 2);
    // horns
    ctx.fillStyle = '#d97706';
    ctx.fillRect(cx-4, cy-4, 2, 1);
    ctx.fillRect(cx+3, cy-4, 2, 1);
    // eyes
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(cx-2, cy-2, 1, 1);
    ctx.fillRect(cx+2, cy-2, 1, 1);
    // nose
    ctx.fillStyle = '#e8a0a0';
    ctx.fillRect(cx-1, cy, 3, 1);
    ctx.globalAlpha = 1;
  } else if(rx >= 3) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-2, cy-3, 4, 6);
    ctx.globalAlpha = 1;
  }
}

function drawDaiInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  if(rx >= 6) {
    // D shape (two horizontal bars + arc)
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.85;
    // Left vertical
    ctx.fillRect(cx-3, cy-5, 2, 10);
    // Top and bottom horizontals
    ctx.fillRect(cx-3, cy-6, Math.min(rx-1, 5), 2);
    ctx.fillRect(cx-3, cy+4, Math.min(rx-1, 5), 2);
    // Double horizontal bar (DAI's ≡ lines)
    ctx.fillStyle = C.dark;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(cx-4, cy-1, rx+1, 1);
    ctx.fillRect(cx-4, cy+1, rx+1, 1);
    ctx.globalAlpha = 1;
  } else if(rx >= 2) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-1, cy-4, 2, 8);
    ctx.globalAlpha = 1;
  }
}

function drawWbtcInner(ctx, ox, cy, rx, C) {
  const cx = ox + 16;
  if(rx >= 6) {
    // B shape
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.85;
    // Vertical stem
    ctx.fillRect(cx-3, cy-5, 2, 11);
    // Top bump
    ctx.fillRect(cx-1, cy-5, Math.min(rx-2, 3), 1);
    ctx.fillRect(cx+1, cy-4, 1, 4);
    ctx.fillRect(cx-1, cy, Math.min(rx-2, 3), 1);
    // Bottom bump
    ctx.fillRect(cx+1, cy+1, 2, 4);
    ctx.fillRect(cx-1, cy+5, Math.min(rx-2, 4), 1);
    // BTC tilt (slight diagonal at top)
    ctx.fillStyle = C.shine;
    ctx.globalAlpha = 0.5;
    ctx.fillRect(cx-4, cy-6, 2, 1);
    ctx.fillRect(cx-4, cy+5, 2, 2);
    ctx.globalAlpha = 1;
  } else if(rx >= 2) {
    ctx.fillStyle = C.symL;
    ctx.globalAlpha = 0.8;
    ctx.fillRect(cx-1, cy-4, 2, 8);
    ctx.globalAlpha = 1;
  }
}

// ─── BUILD SPRITESHEET ───────────────────────────────────────────────────────

function buildSheet(token) {
  const sheet = document.createElement('canvas');
  sheet.width  = FRAME_W * FRAMES;
  sheet.height = FRAME_H;
  const ctx = sheet.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, sheet.width, sheet.height);

  for(let f = 0; f < FRAMES; f++) {
    token.draw(ctx, f, f * FRAME_W);
    // Frame divider
    ctx.strokeStyle = '#ffffff0a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(f*FRAME_W + 0.25, 0.25, FRAME_W - 0.5, FRAME_H - 0.5);
  }
  return sheet;
}

// ─── BUILD UI CARDS ──────────────────────────────────────────────────────────

const frameLabels = ['spin0','spin1','spin2','spin3','risk','capt','imm','batch'];
const frameLabelColors = ['#555','#555','#555','#555','#f97316','#ef4444','#22c55e','#8b5cf6'];

function buildCard(token) {
  const sheet = buildSheet(token);

  const card = document.createElement('div');
  card.className = 'card';

  // Title
  const h3 = document.createElement('h3');
  h3.textContent = `${token.label} — ${token.name}`;
  card.appendChild(h3);

  // Full spritesheet preview (all 8 frames, scaled)
  const sheetPreview = document.createElement('canvas');
  sheetPreview.width  = FRAME_W * FRAMES * 3;
  sheetPreview.height = FRAME_H * 3;
  sheetPreview.style.imageRendering = 'pixelated';
  sheetPreview.style.border = '1px solid #2d1b60';
  sheetPreview.style.borderRadius = '4px';
  sheetPreview.style.background = '#000';
  const spc = sheetPreview.getContext('2d');
  spc.imageSmoothingEnabled = false;
  spc.drawImage(sheet, 0, 0, sheetPreview.width, sheetPreview.height);
  card.appendChild(sheetPreview);

  // Frame labels row
  const labelRow = document.createElement('div');
  labelRow.className = 'frame-strip';
  frameLabels.forEach((lbl, i) => {
    const el = document.createElement('div');
    el.className = 'frame-num';
    el.style.color = frameLabelColors[i];
    el.style.width = `${FRAME_W * 3}px`;
    el.textContent = lbl;
    labelRow.appendChild(el);
  });
  card.appendChild(labelRow);

  // Animated single-frame preview (large)
  const anim = document.createElement('canvas');
  anim.width  = FRAME_W * SCALE;
  anim.height = FRAME_H * SCALE;
  anim.style.imageRendering = 'pixelated';
  anim.style.border = '1px solid #3d2080';
  anim.style.borderRadius = '4px';
  anim.style.background = '#000';
  const ac = anim.getContext('2d');
  ac.imageSmoothingEnabled = false;

  let animFrame = 0;
  let animMode = 0; // 0=spin, 1=cycle status
  let modeTimer = 0;

  const interval = setInterval(() => {
    modeTimer++;
    if(modeTimer > 20) { modeTimer = 0; animMode = (animMode+1) % 2; }
    if(animMode === 0) {
      animFrame = animFrame < 3 ? animFrame + 1 : 0;
    } else {
      animFrame = animFrame < 7 ? animFrame + 1 : 4;
    }

    // Redraw
    const tmpSheet = buildSheet(token);
    ac.clearRect(0, 0, anim.width, anim.height);
    ac.fillStyle = '#000';
    ac.fillRect(0, 0, anim.width, anim.height);
    ac.drawImage(tmpSheet,
      animFrame * FRAME_W, 0, FRAME_W, FRAME_H,
      0, 0, anim.width, anim.height
    );
  }, 180);

  // Draw initial frame
  const tmpSheet = buildSheet(token);
  ac.fillStyle = '#000';
  ac.fillRect(0, 0, anim.width, anim.height);
  ac.drawImage(tmpSheet, 0, 0, FRAME_W, FRAME_H, 0, 0, anim.width, anim.height);

  card.appendChild(anim);

  const tag = document.createElement('div');
  tag.className = 'tag';
  tag.textContent = `${FRAME_W*FRAMES}×${FRAME_H}px · ${FRAMES} frames (4 spin + 4 status)`;
  card.appendChild(tag);

  // Download button
  const btn = document.createElement('button');
  btn.textContent = `⬇ ${token.key}.png`;
  btn.onclick = () => {
    const final = buildSheet(token);
    const a = document.createElement('a');
    a.download = `${token.key}.png`;
    a.href = final.toDataURL('image/png');
    a.click();
  };
  card.appendChild(btn);

  return card;
}

// ─── INIT ────────────────────────────────────────────────────────────────────

const root = document.getElementById('root');
const grid = document.createElement('div');
grid.className = 'grid';
tokens.forEach(t => grid.appendChild(buildCard(t)));
root.appendChild(grid);

// Also build a COMBINED mega-sheet (all tokens stacked vertically)
const combined = document.createElement('div');
combined.style.cssText = 'margin-top:8px;';
const h2 = document.createElement('h2');
h2.style.cssText = 'font-size:10px;color:#f59e0b;letter-spacing:2px;margin-bottom:12px;';
h2.textContent = 'COMBINED SPRITESHEET (all tokens)';
combined.appendChild(h2);

const megaSheet = document.createElement('canvas');
megaSheet.width  = FRAME_W * FRAMES;
megaSheet.height = FRAME_H * tokens.length;
megaSheet.style.imageRendering = 'pixelated';
megaSheet.style.border = '1px solid #3d2080';
megaSheet.style.borderRadius = '4px';
megaSheet.style.background = '#000';
megaSheet.style.display = 'block';
megaSheet.style.marginBottom = '12px';

const mc = megaSheet.getContext('2d');
mc.imageSmoothingEnabled = false;
mc.fillStyle = '#000';
mc.fillRect(0, 0, megaSheet.width, megaSheet.height);
tokens.forEach((t, i) => {
  const s = buildSheet(t);
  mc.drawImage(s, 0, i * FRAME_H);
  // Row label
  mc.fillStyle = '#ffffff33';
  mc.font = '5px monospace';
  mc.fillText(t.label, 2, i*FRAME_H + 10);
  mc.strokeStyle = '#ffffff0a';
  mc.lineWidth = 0.5;
  mc.beginPath();
  mc.moveTo(0, (i+1)*FRAME_H);
  mc.lineTo(megaSheet.width, (i+1)*FRAME_H);
  mc.stroke();
});

// Preview combined at 3x
const megaPreview = document.createElement('canvas');
megaPreview.width  = megaSheet.width * 3;
megaPreview.height = megaSheet.height * 3;
megaPreview.style.imageRendering = 'pixelated';
megaPreview.style.border = '1px solid #3d2080';
megaPreview.style.borderRadius = '4px';
megaPreview.style.background = '#000';
megaPreview.style.display = 'block';
megaPreview.style.marginBottom = '12px';
const mpc = megaPreview.getContext('2d');
mpc.imageSmoothingEnabled = false;
mpc.drawImage(megaSheet, 0, 0, megaPreview.width, megaPreview.height);
combined.appendChild(megaPreview);

const dlAll = document.createElement('button');
dlAll.style.cssText = 'background:#3b0764;color:#e0d0ff;border:1px solid #7c3aed;padding:8px 20px;border-radius:5px;cursor:pointer;font-family:monospace;font-size:10px;letter-spacing:1px;margin-right:10px;';
dlAll.textContent = '⬇ COMBINED tokens_sheet.png';
dlAll.onclick = () => {
  const final = document.createElement('canvas');
  final.width = megaSheet.width;
  final.height = megaSheet.height;
  const fc = final.getContext('2d');
  fc.drawImage(megaSheet, 0, 0);
  const a = document.createElement('a');
  a.download = 'cowswap_tokens_sheet.png';
  a.href = final.toDataURL('image/png');
  a.click();
};
combined.appendChild(dlAll);

const noteEl = document.createElement('p');
noteEl.style.cssText = 'font-size:9px;color:#555;margin-top:10px;line-height:1.6;';
noteEl.innerHTML = `
  Combined sheet: <b style="color:#a78bfa">${FRAME_W*FRAMES}×${FRAME_H*tokens.length}px</b> &nbsp;|&nbsp;
  Each row = 1 token &nbsp;|&nbsp;
  Columns 0-3 = spin animation &nbsp;|&nbsp;
  Col 4 = at risk &nbsp;|&nbsp;
  Col 5 = captured &nbsp;|&nbsp;
  Col 6 = immune (CoW batch) &nbsp;|&nbsp;
  Col 7 = in batch
`;
combined.appendChild(noteEl);

root.appendChild(combined);

// ─── DOWNLOAD ALL ────────────────────────────────────────────────────────────
function downloadAll() {
  tokens.forEach((t, i) => {
    setTimeout(() => {
      const s = buildSheet(t);
      const a = document.createElement('a');
      a.download = `${t.key}.png`;
      a.href = s.toDataURL('image/png');
      a.click();
    }, i * 350);
  });
  // Also download combined
  setTimeout(() => {
    const a = document.createElement('a');
    a.download = 'cowswap_tokens_sheet.png';
    a.href = megaSheet.toDataURL('image/png');
    a.click();
  }, tokens.length * 350 + 200);
}
</script>
</body>
</html>
