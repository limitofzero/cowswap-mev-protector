<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CowSwap: MEV Slayer — Tower Defence Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06040f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: monospace;
    color: #f8f8ff;
  }
  h1 {
    font-size: 13px;
    color: #a78bfa;
    letter-spacing: 3px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .row {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    border-radius: 8px;
    border: 1px solid #2d1b60;
    box-shadow: 0 0 40px #3d208044;
  }
  .legend {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px;
    background: #0d0820;
    border-radius: 8px;
    border: 1px solid #2d1b60;
    min-width: 155px;
  }
  .legend-title {
    font-size: 10px;
    font-weight: bold;
    color: #888;
    margin-bottom: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    color: #ccc;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .subtitle {
    font-size: 10px;
    color: #3d2080;
    margin-top: 10px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<h1>⚔ CowSwap: MEV Slayer — Tower Defence</h1>

<div class="row">
  <canvas id="c" width="580" height="380"></canvas>

  <div style="display:flex;flex-direction:column;gap:10px;">
    <div class="legend">
      <div class="legend-title">Towers</div>
      <div class="leg-item"><div class="dot" style="background:#8b5cf6"></div>Batch Auctioneer</div>
      <div class="leg-item"><div class="dot" style="background:#10b981"></div>CoW Matcher</div>
      <div class="leg-item"><div class="dot" style="background:#f59e0b"></div>Solver</div>
      <div class="leg-item"><div class="dot" style="background:#3b82f6"></div>Dark Pool Node</div>
      <div class="leg-item"><div class="dot" style="background:#ec4899"></div>Slippage Guard</div>
    </div>
    <div class="legend">
      <div class="legend-title">MEV Enemies</div>
      <div class="leg-item"><div class="dot" style="background:#ef4444"></div>Frontrunner</div>
      <div class="leg-item"><div class="dot" style="background:#f97316"></div>Sandwich Bot</div>
      <div class="leg-item"><div class="dot" style="background:#a855f7"></div>Backrunner</div>
      <div class="leg-item"><div class="dot" style="background:#06b6d4"></div>JIT LP</div>
    </div>
    <div class="legend">
      <div class="legend-title">TX Status</div>
      <div class="leg-item"><div class="dot" style="background:#10b981"></div>Safe</div>
      <div class="leg-item"><div class="dot" style="background:#f59e0b"></div>At Risk</div>
      <div class="leg-item"><div class="dot" style="background:#ef4444"></div>Captured</div>
    </div>
  </div>
</div>

<div class="subtitle">ANIMATED MOCKUP — FULL GAME IN RUST + BEVY</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 580, H = 380;
let t = 0;

const P = {
  bg0:'#06040f', bg1:'#0d0820', ground:'#12093a',
  path:'#1a1050', pathEdge:'#2d1b69',
  river:'#0a2040', riverShim:'#0d3060',
  grid:'#150d30', ui:'#1e1040', uiBord:'#3d2080',
  cow:'#8b5cf6', cowL:'#a78bfa', cowD:'#5b21b6',
  green:'#10b981', greenL:'#34d399',
  amber:'#f59e0b', amberL:'#fbbf24',
  blue:'#3b82f6', blueL:'#60a5fa',
  pink:'#ec4899', pinkL:'#f472b6',
  red:'#ef4444', redL:'#f87171',
  orange:'#f97316', orangeL:'#fb923c',
  purple:'#a855f7', purpleL:'#c084fc',
  cyan:'#06b6d4', cyanL:'#22d3ee',
  gold:'#f0a500', white:'#f8f8ff',
  txGreen:'#10b981', txAmber:'#f59e0b', txRed:'#ef4444',
};

const PATH = [
  {x:0,y:130},{x:90,y:130},{x:130,y:170},{x:130,y:230},
  {x:170,y:270},{x:320,y:270},{x:360,y:230},{x:360,y:170},
  {x:400,y:130},{x:580,y:130},
];

function pathAt(d) {
  let total=0; const segs=[];
  for(let i=0;i<PATH.length-1;i++){
    const dx=PATH[i+1].x-PATH[i].x, dy=PATH[i+1].y-PATH[i].y;
    const l=Math.sqrt(dx*dx+dy*dy);
    segs.push({x0:PATH[i].x,y0:PATH[i].y,dx,dy,l});
    total+=l;
  }
  let rem=((d%total)+total)%total;
  for(const s of segs){
    if(rem<=s.l) return {x:s.x0+s.dx*(rem/s.l),y:s.y0+s.dy*(rem/s.l)};
    rem-=s.l;
  }
  return PATH[PATH.length-1];
}
function totalPathLen(){
  let total=0;
  for(let i=0;i<PATH.length-1;i++){
    const dx=PATH[i+1].x-PATH[i].x,dy=PATH[i+1].y-PATH[i].y;
    total+=Math.sqrt(dx*dx+dy*dy);
  }
  return total;
}
const PLEN=totalPathLen();

const towers=[
  {x:200,y:95, type:'batch', name:'Batch\nAuctioneer',range:70,color:P.cow,  colorL:P.cowL,  level:2},
  {x:85, y:210,type:'cow',  name:'CoW\nMatcher',     range:60,color:P.green,colorL:P.greenL,level:3},
  {x:290,y:200,type:'solver',name:'Solver',           range:75,color:P.amber,colorL:P.amberL,level:1},
  {x:440,y:200,type:'dark', name:'Dark Pool\nNode',   range:55,color:P.blue, colorL:P.blueL, level:2},
  {x:320,y:95, type:'slip', name:'Slippage\nGuard',   range:65,color:P.pink, colorL:P.pinkL, level:1},
];

const enemyDefs=[
  {type:'frontrunner',color:P.red,   colorL:P.redL,   speed:1.4,hp:60, maxHp:60, size:7,label:'FR'},
  {type:'sandwich',   color:P.orange,colorL:P.orangeL,speed:0.9,hp:90, maxHp:90, size:9,label:'SW'},
  {type:'backrunner', color:P.purple,colorL:P.purpleL,speed:0.7,hp:120,maxHp:120,size:8,label:'BR'},
  {type:'jitlp',      color:P.cyan,  colorL:P.cyanL,  speed:1.1,hp:50, maxHp:50, size:6,label:'JIT'},
];

let enemies=[],projectiles=[],particles=[],floatingTexts=[];
const wave=3,score=1247,lives=18,mana=70;

function spawnWave(){
  const offsets=[0,80,160,250,320,420];
  const types=[0,1,2,3,1,0];
  enemies=offsets.map((off,i)=>{
    const def=enemyDefs[types[i]];
    return {...def,hp:def.maxHp,d:-off,hit:0,id:i};
  });
}
spawnWave();

function spawnParticle(x,y,color,n=5){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*2+1;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,life:1,color,size:Math.random()*2+1});
  }
}
function spawnText(x,y,text,color){
  floatingTexts.push({x,y,text,color,life:1,vy:-0.8});
}

function drawBG(){
  ctx.fillStyle=P.bg0; ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=0.25; ctx.strokeStyle=P.grid; ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.globalAlpha=1;

  ctx.strokeStyle=P.river; ctx.lineWidth=26;
  ctx.lineJoin='round'; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(PATH[0].x,PATH[0].y);
  for(let i=1;i<PATH.length;i++) ctx.lineTo(PATH[i].x,PATH[i].y);
  ctx.stroke();
  ctx.strokeStyle=P.riverShim; ctx.lineWidth=20; ctx.stroke();
  ctx.strokeStyle=P.pathEdge; ctx.lineWidth=2;
  ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);

  ctx.globalAlpha=0.5;
  for(let i=0;i<8;i++){
    const d=((t*0.5+i*(PLEN/8))%PLEN);
    const pos=pathAt(d);
    const pulse=0.5+0.5*Math.sin(t*0.1+i);
    ctx.fillStyle=P.riverShim;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,2+pulse,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  PATH.forEach((p,i)=>{
    if(i===0||i===PATH.length-1) return;
    ctx.fillStyle='#1a1050'; ctx.strokeStyle='#3d2080'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2); ctx.fill(); ctx.stroke();
  });

  ctx.fillStyle=P.green; ctx.font='bold 9px monospace';
  ctx.fillText('MEMPOOL',2,125);
  ctx.fillStyle=P.greenL; ctx.fillText('IN →',2,137);
  ctx.fillStyle=P.amber; ctx.textAlign='right';
  ctx.fillText('→ SETTLEMENT',W-2,125);
  ctx.fillStyle=P.amberL; ctx.fillText('LAYER',W-2,137);
  ctx.textAlign='left';
}

function drawTower(tower){
  const {x,y,color,colorL,level,range,type}=tower;
  const pulse=0.6+0.4*Math.sin(t*0.05+x);
  ctx.globalAlpha=0.07+0.03*pulse; ctx.strokeStyle=color; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x,y,range,0,Math.PI*2); ctx.stroke();
  ctx.globalAlpha=0.04; ctx.fillStyle=color;
  ctx.beginPath(); ctx.arc(x,y,range,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;

  ctx.fillStyle='#0d0820'; ctx.strokeStyle=color; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x-16,y+12,32,10,3); ctx.fill(); ctx.stroke();
  ctx.fillStyle=P.ui; ctx.strokeStyle=color; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x-13,y-18,26,32,4); ctx.fill(); ctx.stroke();
  ctx.fillStyle=color;
  ctx.beginPath(); ctx.roundRect(x-13,y-18,26,8,[4,4,0,0]); ctx.fill();
  ctx.globalAlpha=0.4*pulse; ctx.fillStyle=colorL;
  ctx.beginPath(); ctx.roundRect(x-10,y-16,8,4,2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=colorL; ctx.font='bold 10px monospace'; ctx.textAlign='center';
  const icons={batch:'BA',cow:'CoW',solver:'SLV',dark:'DP',slip:'SG'};
  ctx.fillText(icons[type]||'?',x,y+6); ctx.textAlign='left';
  for(let i=0;i<level;i++){
    ctx.fillStyle=P.gold; ctx.beginPath(); ctx.arc(x-8+i*8,y+17,2.5,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle=colorL; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(x,y-18); ctx.lineTo(x,y-26); ctx.stroke();
  ctx.fillStyle=colorL;
  const ap=0.5+0.5*Math.sin(t*0.08+x*0.1);
  ctx.globalAlpha=ap; ctx.beginPath(); ctx.arc(x,y-27,3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  ctx.fillStyle=colorL; ctx.font='7px monospace'; ctx.textAlign='center';
  const lines=tower.name.split('\n');
  lines.forEach((l,i)=>ctx.fillText(l,x,y+32+i*9));
  ctx.textAlign='left';
}

function drawEnemy(e){
  if(e.d<0) return;
  const pos=pathAt(e.d);
  const {x,y}=pos;
  const fl=e.hit>0;
  const color=fl?'#ffffff':e.color;
  const colorL=fl?'#ffcccc':e.colorL;
  const sz=e.size;
  ctx.globalAlpha=0.3; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(x,y+sz+2,sz*1.2,3,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=color; ctx.strokeStyle=colorL; ctx.lineWidth=1.5;
  if(e.type==='sandwich'){
    ctx.beginPath(); ctx.roundRect(x-sz-2,y-sz/2,(sz+2)*2,sz/2+2,2); ctx.fill(); ctx.stroke();
    ctx.fillStyle=P.green; ctx.beginPath(); ctx.rect(x-sz,y-1,sz*2,3); ctx.fill();
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.roundRect(x-sz-2,y+3,(sz+2)*2,sz/2+2,2); ctx.fill(); ctx.stroke();
  } else if(e.type==='jitlp'){
    ctx.beginPath(); ctx.moveTo(x,y-sz); ctx.lineTo(x+sz,y);
    ctx.lineTo(x,y+sz); ctx.lineTo(x-sz,y); ctx.closePath(); ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.roundRect(x-sz,y-sz,sz*2,sz*2,sz*0.4); ctx.fill(); ctx.stroke();
  }
  const eyeP=0.7+0.3*Math.sin(t*0.12+e.id);
  ctx.globalAlpha=eyeP; ctx.fillStyle=colorL;
  ctx.beginPath(); ctx.arc(x-sz*0.3,y-sz*0.2,sz*0.25,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+sz*0.3,y-sz*0.2,sz*0.25,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=colorL; ctx.font='bold 7px monospace'; ctx.textAlign='center';
  ctx.fillText(e.label,x,y+sz+12); ctx.textAlign='left';
  const bw=sz*3,bh=3,bx=x-bw/2,by=y-sz-10;
  ctx.fillStyle='#1a0808'; ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,1); ctx.fill();
  const pct=e.hp/e.maxHp;
  ctx.fillStyle=pct>0.6?P.green:pct>0.3?P.amber:P.red;
  ctx.beginPath(); ctx.roundRect(bx,by,bw*pct,bh,1); ctx.fill();
}

function drawTransactions(){
  const txData=[
    {offset:PLEN*0.05,val:'0.8 ETH',status:'safe'},
    {offset:PLEN*0.35,val:'2.4 COW',status:'risk'},
    {offset:PLEN*0.62,val:'1.1 ETH',status:'safe'},
  ];
  txData.forEach((tx,i)=>{
    const d=(t*0.4+tx.offset)%PLEN;
    const pos=pathAt(d);
    const pulse=0.5+0.5*Math.sin(t*0.1+i*2);
    const color=tx.status==='safe'?P.txGreen:P.txAmber;
    ctx.globalAlpha=0.3*pulse; ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(pos.x,pos.y,12,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    ctx.fillStyle=color; ctx.strokeStyle='#000'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.roundRect(pos.x-12,pos.y-9,24,18,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#000'; ctx.font='bold 7px monospace'; ctx.textAlign='center';
    ctx.fillText('TX',pos.x,pos.y+3); ctx.textAlign='left';
    ctx.fillStyle=color; ctx.globalAlpha=0.9; ctx.font='6px monospace';
    ctx.textAlign='center'; ctx.fillText(tx.val,pos.x,pos.y-14);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  });
}

function drawProjectiles(){
  projectiles.forEach(p=>{
    ctx.globalAlpha=p.life; ctx.strokeStyle=p.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(p.ox,p.oy); ctx.lineTo(p.x,p.y); ctx.stroke();
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  });
}

function drawHUD(){
  ctx.fillStyle='rgba(6,4,15,0.9)'; ctx.fillRect(0,0,W,36);
  ctx.strokeStyle=P.uiBord; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,36); ctx.lineTo(W,36); ctx.stroke();
  ctx.fillStyle=P.cowL; ctx.font='bold 12px monospace'; ctx.fillText('CoW',10,22);
  ctx.fillStyle=P.cow; ctx.fillText('Swap',36,22);
  ctx.fillStyle=P.amberL; ctx.font='bold 9px monospace'; ctx.textAlign='center';
  ctx.fillText(`WAVE ${wave}`,W/2,15);
  ctx.fillStyle=P.amber; ctx.font='8px monospace';
  ctx.fillText('MEV ATTACK INCOMING',W/2,28); ctx.textAlign='left';
  ctx.fillStyle=P.gold; ctx.font='bold 9px monospace'; ctx.textAlign='right';
  ctx.fillText(`${score+Math.floor(t/30)} pts`,W-10,15);
  ctx.fillStyle=P.green; ctx.fillText(`${lives} SAFE`,W-10,28); ctx.textAlign='left';

  const by=H-40;
  ctx.fillStyle='rgba(6,4,15,0.88)'; ctx.fillRect(0,by,W,40);
  ctx.strokeStyle=P.uiBord; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,by); ctx.lineTo(W,by); ctx.stroke();
  ctx.fillStyle=P.uiBord; ctx.font='7px monospace'; ctx.fillText('MANA',10,by+14);
  ctx.fillStyle='#0d0820'; ctx.beginPath(); ctx.roundRect(46,by+6,120,7,2); ctx.fill();
  ctx.fillStyle=P.blue; ctx.beginPath(); ctx.roundRect(46,by+6,120*(mana/100),7,2); ctx.fill();

  const btns=[
    {label:'BA',color:P.cow,  cost:150},{label:'CoW',color:P.green,cost:200},
    {label:'SLV',color:P.amber,cost:180},{label:'DP',color:P.blue,cost:220},
    {label:'SG',color:P.pink,cost:130},
  ];
  btns.forEach((btn,i)=>{
    const bx=180+i*72,by2=by+4;
    ctx.fillStyle=P.ui; ctx.strokeStyle=btn.color; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(bx,by2,64,32,4); ctx.fill(); ctx.stroke();
    ctx.fillStyle=btn.color; ctx.font='bold 8px monospace'; ctx.textAlign='center';
    ctx.fillText(btn.label,bx+32,by2+14);
    ctx.fillStyle='#666'; ctx.font='7px monospace';
    ctx.fillText(`${btn.cost}G`,bx+32,by2+26);
  });
  ctx.textAlign='left';
  ctx.fillStyle=P.ui; ctx.strokeStyle=P.uiBord; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(W-70,by+6,28,24,4); ctx.fill(); ctx.stroke();
  ctx.fillStyle=P.green; ctx.font='bold 12px monospace'; ctx.textAlign='center';
  ctx.fillText('▶',W-56,by+23);
  ctx.fillStyle=P.ui; ctx.strokeStyle=P.uiBord;
  ctx.beginPath(); ctx.roundRect(W-38,by+6,28,24,4); ctx.fill(); ctx.stroke();
  ctx.fillStyle=P.amber; ctx.fillText('2x',W-24,by+23); ctx.textAlign='left';
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,p.size*2,p.size*2);
  });
  floatingTexts.forEach(ft=>{
    ctx.globalAlpha=ft.life; ctx.fillStyle=ft.color;
    ctx.font='bold 9px monospace'; ctx.textAlign='center';
    ctx.fillText(ft.text,ft.x,ft.y);
  });
  ctx.globalAlpha=1; ctx.textAlign='left';
}

function update(){
  t++;
  enemies.forEach(e=>{ if(e.d<0){e.d+=e.speed;return;} e.d+=e.speed; if(e.hit>0)e.hit--; });

  towers.forEach((tower,ti)=>{
    if(t%(40-ti*4)!==ti*7) return;
    let closest=null,minDist=Infinity;
    enemies.forEach(e=>{
      if(e.d<0||e.hp<=0) return;
      const pos=pathAt(e.d);
      const dist=Math.hypot(pos.x-tower.x,pos.y-tower.y);
      if(dist<tower.range&&dist<minDist){minDist=dist;closest=e;}
    });
    if(closest){
      const pos=pathAt(closest.d);
      projectiles.push({x:tower.x,y:tower.y,ox:tower.x,oy:tower.y,
        tx:pos.x,ty:pos.y,color:tower.color,life:1,speed:6,targetEnemy:closest});
    }
  });

  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    const dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.hypot(dx,dy);
    if(dist<8){
      if(p.targetEnemy){
        p.targetEnemy.hp=Math.max(0,p.targetEnemy.hp-15);
        p.targetEnemy.hit=6;
        spawnParticle(p.tx,p.ty,p.color,4);
        spawnText(p.tx,p.ty-10,'-15',p.color);
      }
      projectiles.splice(i,1); continue;
    }
    p.ox=p.x; p.oy=p.y;
    p.x+=dx/dist*p.speed; p.y+=dy/dist*p.speed;
    p.life-=0.01;
    if(p.life<=0){projectiles.splice(i,1);continue;}
    if(p.targetEnemy&&p.targetEnemy.d>=0){
      const pos=pathAt(p.targetEnemy.d); p.tx=pos.x; p.ty=pos.y;
    }
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.03;
    if(p.life<=0) particles.splice(i,1);
  }
  for(let i=floatingTexts.length-1;i>=0;i--){
    const ft=floatingTexts[i];
    ft.y+=ft.vy; ft.life-=0.025;
    if(ft.life<=0) floatingTexts.splice(i,1);
  }

  enemies.forEach(e=>{
    if(e.d>=PLEN){e.d=-Math.random()*150;e.hp=e.maxHp;}
    if(e.hp<=0){
      const pos=pathAt(e.d);
      spawnParticle(pos.x,pos.y,e.color,8);
      spawnText(pos.x,pos.y-14,`+${Math.floor(e.maxHp/3)}G`,P.gold);
      e.d=-Math.random()*200; e.hp=e.maxHp;
    }
  });
  if(t%20===0) spawnParticle(Math.random()*W,H-42,P.uiBord,2);
}

function draw(){
  drawBG();
  drawTransactions();
  towers.forEach(drawTower);
  enemies.forEach(drawEnemy);
  drawProjectiles();
  drawParticles();
  drawHUD();
  ctx.globalAlpha=0.03; ctx.fillStyle='#000';
  for(let y=0;y<H;y+=2) ctx.fillRect(0,y,W,1);
  ctx.globalAlpha=1;
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
