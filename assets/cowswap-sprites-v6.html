<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CowSwap Sprites v5</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#08060f; color:#f0f0ff; font-family:monospace; padding:24px; }
  h1 { color:#a78bfa; font-size:12px; letter-spacing:3px; margin-bottom:4px; }
  .sub { font-size:9px; color:#444; margin-bottom:20px; letter-spacing:1px; }
  .section { margin-bottom:32px; }
  .section-title { font-size:9px; color:#f59e0b; letter-spacing:3px; border-bottom:1px solid #2d1b60; padding-bottom:6px; margin-bottom:14px; }
  .grid { display:flex; flex-wrap:wrap; gap:16px; }
  .card { background:#0d0a22; border:1px solid #2d1b60; border-radius:8px; padding:12px 14px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .card h3 { font-size:9px; color:#a78bfa; letter-spacing:1px; }
  canvas { image-rendering:pixelated; border-radius:4px; }
  .checker {
    background-image: linear-gradient(45deg,#1a1a2e 25%,transparent 25%), linear-gradient(-45deg,#1a1a2e 25%,transparent 25%), linear-gradient(45deg,transparent 75%,#1a1a2e 75%), linear-gradient(-45deg,transparent 75%,#1a1a2e 75%);
    background-size:8px 8px; background-position:0 0,0 4px,4px -4px,-4px 0; background-color:#0d0d1f;
  }
  button { background:#1a0a3a; color:#a78bfa; border:1px solid #4c1d95; padding:5px 12px; border-radius:4px; cursor:pointer; font-family:monospace; font-size:9px; letter-spacing:1px; width:100%; }
  button:hover { background:#2d1b60; }
  .dl-all { background:#2d1265; color:#e0d0ff; border:1px solid #7c3aed; padding:9px 24px; border-radius:6px; cursor:pointer; font-family:monospace; font-size:10px; letter-spacing:2px; margin-bottom:22px; display:inline-block; }
  .dl-all:hover { background:#4c1d95; }
  .tag { font-size:8px; color:#444; }
</style>
</head>
<body>
<h1>⚔ COWSWAP SPRITES v5 — MOCKUP EXACT</h1>
<p class="sub">Sharp body · crisp text · only antenna blinks · no name label · 6 frames · transparent</p>
<button class="dl-all" onclick="downloadAll()">⬇ DOWNLOAD ALL</button>
<div id="root"></div>

<script>
// ─── SIZING ───────────────────────────────────────────────────────────────────
// Inner sprite content (matching mockup proportions, scaled up 2x for clarity)
// Mockup tower body: 26×32px. We use 2x → 52×64, antenna adds ~20px above.
// PAD = 16 on each side so the antenna dot glow (shadowBlur=8) never clips.

const PAD   = 16;   // transparent margin each side
const IW    = 52;   // inner content width
const IH    = 90;   // inner content height (antenna tip to platform bottom)
const CW    = IW + PAD*2;  // 84
const CH    = IH + PAD*2;  // 122
const FRAMES_T = 6; // tower animation frames

// TX token inner: 48×56, pad 16
const XW = 48, XH = 56;
const XCW = XW + PAD*2, XCH = XH + PAD*2; // 80×88
const FRAMES_X = 8;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const make = (w,h) => { const c=document.createElement('canvas'); c.width=w; c.height=h; return c; };

function rrect(ctx,x,y,w,h,r,fill,stroke,sw=1.5){
  ctx.beginPath(); ctx.roundRect(x,y,w,h,r);
  if(fill){ctx.fillStyle=fill; ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke();}
}
function circ(ctx,x,y,r,fill,stroke,sw=1.5){
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  if(fill){ctx.fillStyle=fill; ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=sw; ctx.stroke();}
}
function txt(ctx,text,x,y,size,color,weight='bold'){
  ctx.fillStyle=color;
  ctx.font=`${weight} ${size}px "Courier New",monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,x,y);
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}

// ─── TOWER DEFINITIONS ───────────────────────────────────────────────────────
const towers = [
  { key:'tower_ba',  abbr:'BA',  color:'#8b5cf6', colorL:'#c4b5fd', bodyC:'#1e1040', bordC:'#8b5cf6' },
  { key:'tower_sg',  abbr:'SG',  color:'#ec4899', colorL:'#f9a8d4', bodyC:'#200830', bordC:'#ec4899' },
  { key:'tower_slv', abbr:'SLV', color:'#f59e0b', colorL:'#fde68a', bodyC:'#1a1200', bordC:'#f59e0b' },
  { key:'tower_dp',  abbr:'DP',  color:'#3b82f6', colorL:'#93c5fd', bodyC:'#001525', bordC:'#3b82f6' },
  { key:'tower_cow', abbr:'CoW', color:'#10b981', colorL:'#6ee7b7', bodyC:'#031a0f', bordC:'#10b981' },
];

// ─── DRAW TOWER (single frame) ────────────────────────────────────────────────
// Faithfully matches drawTower() from mockup, but at 2x scale, transparent bg,
// antenna blink is the only animation — encoded as 'antAlpha' parameter (0..1).
// Body and text are always sharp (no shadowBlur on them).
//
// Layout inside IW×IH logical space (origin = PAD,PAD on canvas):
//   ant tip  y=0
//   ant base y=18
//   body top y=18   body h=64  body w=52
//   band     y=18   band h=16
//   abbr     y=18+16+24 = 58 (center of body below band)
//   platform y=82   h=10
//   IH=92 → fits in CH=90+PAD*2

function drawTower(tower, frame) {
  const c = make(CW, CH);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Shared phase: one full sine cycle over 6 frames
  const phase = (frame / FRAMES_T) * Math.PI * 2;
  // Antenna pulses with dot[0] — they peak together
  const antAlpha = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(phase));

  // Offset all drawing by PAD
  ctx.save();
  ctx.translate(PAD, PAD);

  const cx = IW / 2;  // 26
  // ── Body dims (matching mockup 26×32 at 2x) ──
  const bw = 52, bh = 64;
  const bx = 0, by = 18;
  const bandH = 16;
  const platH = 10;
  const platW = bw + 8;
  const platX = bx - 4;

  // ── ANTENNA ──
  // Pole: from body top up 18px
  ctx.strokeStyle = tower.colorL;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, by);
  ctx.lineTo(cx, 6);
  ctx.stroke();

  // Antenna dot — ONLY animated part
  // Slight glow only on the dot (small blur, contained by PAD)
  ctx.globalAlpha = antAlpha;
  ctx.shadowColor = tower.colorL;
  ctx.shadowBlur = 8;
  circ(ctx, cx, 4, 5, tower.colorL);
  ctx.shadowBlur = 0;
  // Bright core always visible
  ctx.globalAlpha = antAlpha * 0.9 + 0.1;
  circ(ctx, cx, 4, 2.5, '#ffffff');
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // ── BODY ──
  // Dark fill, colored border — sharp, no blur
  rrect(ctx, bx, by, bw, bh, 8, tower.bodyC, tower.bordC, 2);

  // Inner subtle highlight on body (top edge)
  ctx.globalAlpha = 0.08;
  rrect(ctx, bx+4, by+4, bw-8, 8, [4,4,0,0], '#ffffff');
  ctx.globalAlpha = 1;

  // ── TOP COLOR BAND ──
  // Solid color, same border, sharp
  rrect(ctx, bx, by, bw, bandH, [8,8,0,0], tower.color, tower.bordC, 2);

  // Band inner shine strip (sharp, not blurred)
  ctx.globalAlpha = 0.3;
  rrect(ctx, bx+6, by+4, bw-22, 5, 2, '#ffffff');
  ctx.globalAlpha = 1;

  // ── ABBREVIATION TEXT ──
  // Bold, centered in body area below band. Crisp, no shadow.
  const fontSize = tower.abbr.length > 2 ? 14 : 18;
  txt(ctx, tower.abbr, cx, by + bandH + (bh - bandH)/2, fontSize, tower.colorL);

  // ── SMALL SCREEN DETAILS inside body ──
  // 3 dots with smooth sine-based alpha, each 120° apart in phase.
  // frame goes 0..5 → phase 0..2π, giving one full cycle per animation loop.
  [0,1,2].forEach(i=>{
    // Each dot offset by 120° (2π/3). Clamp to 0.12..1.0 range.
    const a = 0.12 + 0.88 * (0.5 + 0.5 * Math.sin(phase - i * (Math.PI * 2 / 3)));
    ctx.globalAlpha = a;
    circ(ctx, bx+9+i*15, by+bh-10, 4, tower.color);
    // White core scales with brightness
    ctx.globalAlpha = a * 0.65;
    circ(ctx, bx+9+i*15, by+bh-10, 2, '#ffffff');
  });
  ctx.globalAlpha = 1;

  // Side accent bar
  ctx.fillStyle = tower.color;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(bx+bw-7, by+bandH+6, 4, bh-bandH-20);
  ctx.globalAlpha = 1;

  // ── BASE PLATFORM ──
  rrect(ctx, platX, by+bh, platW, platH, [0,0,5,5], '#0d0820', tower.bordC+'99', 1.5);
  // Platform shadow strip
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000000';
  ctx.fillRect(platX+3, by+bh+platH-3, platW-6, 3);
  ctx.globalAlpha = 1;

  ctx.restore();
  return c;
}

// ─── TX TOKEN DEFINITIONS ────────────────────────────────────────────────────
const txTokens = [
  { key:'tx_eth',  abbr:'Ξ',  label:'ETH',  bodyC:'#0e0e30', bandC:'#627eea', bandL:'#a5b4fc', bordC:'#4f46e5' },
  { key:'tx_usdt', abbr:'₮',  label:'USDT', bodyC:'#001a0f', bandC:'#26a17b', bandL:'#6ee7b7', bordC:'#059669' },
  { key:'tx_usdc', abbr:'$',  label:'USDC', bodyC:'#001228', bandC:'#2775ca', bandL:'#93c5fd', bordC:'#1d4ed8' },
  { key:'tx_cow',  abbr:'🐄', label:'COW',  bodyC:'#100630', bandC:'#8b5cf6', bandL:'#c4b5fd', bordC:'#6d28d9' },
  { key:'tx_dai',  abbr:'D',  label:'DAI',  bodyC:'#180e00', bandC:'#f5ac37', bandL:'#fde68a', bordC:'#d97706' },
  { key:'tx_wbtc', abbr:'₿',  label:'WBTC', bodyC:'#1a0800', bandC:'#f7931a', bandL:'#fed7aa', bordC:'#c2410c' },
];

// Frames 0-3: spin. 4=risk 5=captured 6=immune 7=in-batch
const TX_STATUS = [
  null,
  { tint:'#f97316', bordC:'#ea580c', badge:'!' },
  { tint:'#ef4444', bordC:'#b91c1c', badge:'X' },
  { tint:'#10b981', bordC:'#047857', badge:'S' },
  { tint:'#8b5cf6', bordC:'#5b21b6', badge:'#' },
];

// Spin: coin width per frame (fake 3D rotation)
const SPIN_W = [XW, Math.round(XW*0.7), Math.round(XW*0.35), 4, Math.round(XW*0.35), Math.round(XW*0.7)];
// 6 spin frames for smooth rotation, then 2 status extras = 8 total but
// we keep 8 frames: 0-5 spin, 6-7 status (risk + immune). adjust:
// Actually: frames 0-3 spin (4 steps, like original), 4=risk,5=cap,6=imm,7=batch
// For tokens keep 8 frames as before (game needs status variants)

function drawTx(token, frame) {
  const c = make(XCW, XCH);
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.save();
  ctx.translate(PAD, PAD);

  const isStatus = frame >= 4;
  const spinFrame = isStatus ? 0 : frame;
  const status = isStatus ? TX_STATUS[frame - 3] : null;

  // Coin spin: fake perspective via width
  const spinWidths = [XW, Math.round(XW*0.65), Math.round(XW*0.25), Math.round(XW*0.65)];
  const coinW = spinWidths[spinFrame];
  const coinH = XH - 8; // leave room for label
  const cx = XW/2;
  const cy = coinH/2;
  const coinX = cx - coinW/2;
  const coinY = 0;
  const br = Math.min(6, coinW/4);

  const mainC = status ? status.tint  : token.bandC;
  const bordC = status ? status.bordC : token.bordC;

  if(coinW < 6) {
    // Edge-on: thin line, no blur
    ctx.fillStyle = mainC;
    ctx.fillRect(cx-1.5, coinY, 3, coinH);
    ctx.restore(); return c;
  }

  // ── EDGE DEPTH (shift+recolor) ──
  ctx.globalAlpha = 0.5;
  rrect(ctx, coinX+2, coinY+2, coinW, coinH, br, bordC+'88');
  ctx.globalAlpha = 1;

  // ── BODY — sharp, no blur ──
  rrect(ctx, coinX, coinY, coinW, coinH, br, token.bodyC, bordC, 2);

  // ── BAND ──
  const bandH = 16;
  if(coinW >= 10) {
    rrect(ctx, coinX, coinY, coinW, bandH, [br,br,0,0], mainC, bordC, 2);
    // Shine
    ctx.globalAlpha = 0.28;
    rrect(ctx, coinX+4, coinY+3, Math.max(2,coinW-14), 5, 2, '#ffffff');
    ctx.globalAlpha = 1;

    // Symbol — crisp
    const symFS = coinW >= 36 ? 11 : coinW >= 20 ? 8 : 6;
    txt(ctx, token.abbr==='🐄'?'🐄':token.abbr, cx, coinY + bandH/2, symFS, '#ffffff');
  }

  // ── TX LABEL in body — crisp ──
  if(coinW >= 20) {
    txt(ctx, 'TX', cx, coinY + bandH + (coinH-bandH)/2, 10, mainC+'cc');
  }

  // ── GLINT (sharp ellipse, no blur) ──
  if(coinW >= 16) {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(coinX + coinW*0.27, coinY+4, coinW*0.12, 3.5, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── STATUS BADGE ──
  if(status) {
    const bx = coinX + coinW + 3, by2 = coinY - 3;
    circ(ctx, bx, by2, 8, mainC, '#000000', 1);
    txt(ctx, status.badge, bx, by2, 7, '#ffffff');
  }

  // ── CRACK for captured ──
  if(status && status.badge === 'X' && coinW >= 10) {
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = '#ff4444'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx-2, coinY+3); ctx.lineTo(cx+3, cy); ctx.lineTo(cx-2, coinY+coinH-3);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
  return c;
}

// ─── SHEET BUILDERS ───────────────────────────────────────────────────────────
function buildTowerSheet(tower) {
  const sheet = make(CW * FRAMES_T, CH);
  const ctx = sheet.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  for(let f=0; f<FRAMES_T; f++) ctx.drawImage(drawTower(tower, f), f*CW, 0);
  return sheet;
}
function buildTxSheet(token) {
  const sheet = make(XCW * FRAMES_X, XCH);
  const ctx = sheet.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  for(let f=0; f<FRAMES_X; f++) ctx.drawImage(drawTx(token, f), f*XCW, 0);
  return sheet;
}

// ─── UI ──────────────────────────────────────────────────────────────────────
const addChecker = c => { c.className='checker'; return c; };
const dl = (canvas, name) => { const a=document.createElement('a'); a.download=name+'.png'; a.href=canvas.toDataURL('image/png'); a.click(); };

function buildTowerCard(tower) {
  const card = document.createElement('div'); card.className='card';
  const h3=document.createElement('h3'); h3.textContent=tower.abbr; card.appendChild(h3);

  // Full sheet preview (2x)
  const sheet = buildTowerSheet(tower);
  const sp = make(sheet.width*2, sheet.height*2); addChecker(sp); sp.style.border='1px solid #2d1b60';
  const sc=sp.getContext('2d'); sc.imageSmoothingEnabled=false; sc.drawImage(sheet,0,0,sp.width,sp.height);
  card.appendChild(sp);

  // Animated single frame (large)
  const ASCALE = 3;
  const anim = make(CW*ASCALE, CH*ASCALE); addChecker(anim); anim.style.border='1px solid #3d2080';
  const ac=anim.getContext('2d'); ac.imageSmoothingEnabled=false;
  let af=0;
  setInterval(()=>{
    af=(af+1)%FRAMES_T;
    ac.clearRect(0,0,anim.width,anim.height);
    ac.drawImage(drawTower(tower,af),0,0,anim.width,anim.height);
  }, 120);
  ac.drawImage(drawTower(tower,0),0,0,anim.width,anim.height);
  card.appendChild(anim);

  const t=document.createElement('div'); t.className='tag';
  t.textContent=`${CW*FRAMES_T}×${CH}px · ${FRAMES_T} frames · PAD=${PAD}`;
  card.appendChild(t);
  const btn=document.createElement('button'); btn.textContent=`⬇ ${tower.key}.png`; btn.onclick=()=>dl(buildTowerSheet(tower),tower.key); card.appendChild(btn);
  return card;
}

function buildTxCard(token) {
  const card=document.createElement('div'); card.className='card';
  const h3=document.createElement('h3'); h3.textContent=token.label; card.appendChild(h3);

  const sheet=buildTxSheet(token);
  const sp=make(sheet.width*3,sheet.height*3); addChecker(sp); sp.style.border='1px solid #2d1b60';
  const sc=sp.getContext('2d'); sc.imageSmoothingEnabled=false; sc.drawImage(sheet,0,0,sp.width,sp.height);
  card.appendChild(sp);

  const ASCALE=4;
  const anim=make(XCW*ASCALE,XCH*ASCALE); addChecker(anim); anim.style.border='1px solid #3d2080';
  const ac=anim.getContext('2d'); ac.imageSmoothingEnabled=false;
  let af=0;
  setInterval(()=>{
    af=(af+1)%FRAMES_X;
    ac.clearRect(0,0,anim.width,anim.height);
    ac.drawImage(drawTx(token,af),0,0,anim.width,anim.height);
  }, 100);
  ac.drawImage(drawTx(token,0),0,0,anim.width,anim.height);
  card.appendChild(anim);

  const t=document.createElement('div'); t.className='tag';
  t.textContent=`${XCW*FRAMES_X}×${XCH}px · ${FRAMES_X} frames · transparent`;
  card.appendChild(t);
  const btn=document.createElement('button'); btn.textContent=`⬇ ${token.key}.png`; btn.onclick=()=>dl(buildTxSheet(token),token.key); card.appendChild(btn);
  return card;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
const root=document.getElementById('root');
function section(title,cards){
  const s=document.createElement('div'); s.className='section';
  const tt=document.createElement('div'); tt.className='section-title'; tt.textContent=title; s.appendChild(tt);
  const g=document.createElement('div'); g.className='grid'; cards.forEach(c=>g.appendChild(c)); s.appendChild(g);
  root.appendChild(s);
}
section('TOWERS — 6 FRAMES (antenna blink only)', towers.map(buildTowerCard));
section('TX TOKENS — 8 FRAMES (4 spin + 4 status)', txTokens.map(buildTxCard));

// ── COMBINED ──
const combSec=document.createElement('div'); combSec.className='section';
const ct=document.createElement('div'); ct.className='section-title'; ct.textContent='COMBINED SHEETS'; combSec.appendChild(ct);

// Towers
const tc=make(CW*FRAMES_T, CH*towers.length);
const tcc=tc.getContext('2d'); tcc.imageSmoothingEnabled=false;
towers.forEach((t,i)=>tcc.drawImage(buildTowerSheet(t),0,i*CH));
const tcp=make(tc.width*2,tc.height*2); addChecker(tcp);
tcp.style.cssText='display:block;margin-bottom:10px;border:1px solid #2d1b60;border-radius:4px;';
const tcpc=tcp.getContext('2d'); tcpc.imageSmoothingEnabled=false; tcpc.drawImage(tc,0,0,tcp.width,tcp.height);
combSec.appendChild(tcp);
const tBtn=document.createElement('button'); tBtn.className='dl-all'; tBtn.style.cssText='font-size:9px;padding:7px 16px;';
tBtn.textContent=`⬇ cowswap_towers_sheet.png  [${CW*FRAMES_T}×${CH*towers.length}]`;
tBtn.onclick=()=>dl(tc,'cowswap_towers_sheet'); combSec.appendChild(tBtn);

// Tokens
const xc=make(XCW*FRAMES_X, XCH*txTokens.length);
const xcc=xc.getContext('2d'); xcc.imageSmoothingEnabled=false;
txTokens.forEach((t,i)=>xcc.drawImage(buildTxSheet(t),0,i*XCH));
const xp=make(xc.width*3,xc.height*3); addChecker(xp);
xp.style.cssText='display:block;margin:16px 0 10px;border:1px solid #2d1b60;border-radius:4px;';
const xpc=xp.getContext('2d'); xpc.imageSmoothingEnabled=false; xpc.drawImage(xc,0,0,xp.width,xp.height);
combSec.appendChild(xp);
const xBtn=document.createElement('button'); xBtn.className='dl-all'; xBtn.style.cssText='font-size:9px;padding:7px 16px;';
xBtn.textContent=`⬇ cowswap_tokens_sheet.png  [${XCW*FRAMES_X}×${XCH*txTokens.length}]`;
xBtn.onclick=()=>dl(xc,'cowswap_tokens_sheet'); combSec.appendChild(xBtn);

root.appendChild(combSec);

// ── BEVY INFO ──
const info=document.createElement('pre');
info.style.cssText='background:#0d0a22;border:1px solid #2d1b60;border-radius:6px;padding:14px;font-size:9px;color:#a78bfa;line-height:1.8;margin-top:8px;white-space:pre-wrap;';
info.textContent=
`// Tower spritesheet: ${CW*FRAMES_T}×${CH*towers.length}px
// Frame size: ${CW}×${CH}  (inner ${IW}×${IH} + ${PAD}px padding each side)
// 6 frames = smooth antenna blink  |  5 tower types = 5 rows
TextureAtlasLayout::from_grid(UVec2::new(${CW}, ${CH}), ${FRAMES_T}, ${towers.length}, None, None)
// Row: 0=BA  1=SG  2=SLV  3=DP  4=CoW

// Token spritesheet: ${XCW*FRAMES_X}×${XCH*txTokens.length}px
// Frame size: ${XCW}×${XCH}  (inner ${XW}×${XH} + ${PAD}px padding each side)
// Col 0-3: spin  |  4=risk  5=captured  6=immune  7=in-batch
TextureAtlasLayout::from_grid(UVec2::new(${XCW}, ${XCH}), ${FRAMES_X}, ${txTokens.length}, None, None)
// Row: 0=ETH  1=USDT  2=USDC  3=COW  4=DAI  5=WBTC`;
root.appendChild(info);

function downloadAll(){
  towers.forEach((t,i)=>setTimeout(()=>dl(buildTowerSheet(t),t.key),i*300));
  txTokens.forEach((t,i)=>setTimeout(()=>dl(buildTxSheet(t),t.key),(towers.length+i)*300+200));
  setTimeout(()=>dl(tc,'cowswap_towers_sheet'),(towers.length+txTokens.length)*300+600);
  setTimeout(()=>dl(xc,'cowswap_tokens_sheet'),(towers.length+txTokens.length)*300+900);
}
</script>
</body>
</html>
