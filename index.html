<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoW MEV Defense</title>
  <!-- Tell trunk to build the lib target (has #[wasm_bindgen(start)]) -->
  <link data-trunk rel="rust" data-target-name="cow_mev_defense" />
  <link data-trunk rel="copy-dir" href="assets" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    canvas#bevy-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
      z-index: 100;
      transition: opacity 0.4s ease;
    }
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-family: monospace;
      font-size: 28px;
      font-weight: bold;
      color: #c4a3ff;
      letter-spacing: 2px;
    }
    .loading-sub {
      font-family: monospace;
      font-size: 13px;
      color: #5a4a8a;
      letter-spacing: 1px;
    }

    .progress-bar {
      width: 260px;
      height: 6px;
      background: #1a1428;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6a3fcf, #c4a3ff);
      border-radius: 3px;
      animation: indeterminate 1.6s ease-in-out infinite;
      transform-origin: left;
    }
    @keyframes indeterminate {
      0%   { width: 0%;   margin-left: 0%; }
      50%  { width: 60%;  margin-left: 20%; }
      100% { width: 0%;   margin-left: 100%; }
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.4s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-title">CoW MEV Defense</div>
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <div class="loading-sub">Loading mempool<span class="loading-dots"></span></div>
  </div>

  <canvas id="bevy-canvas"></canvas>

  <script>
    // Hide the loading screen once Bevy has drawn its first frame.
    // Bevy sets explicit pixel dimensions on the canvas when it initialises WebGL;
    // we poll for that in rAF and then wait one more frame so the first render is done.
    (function () {
      const overlay = document.getElementById('loading');
      const canvas  = document.getElementById('bevy-canvas');

      function check() {
        if (canvas.width > 0 && canvas.height > 0) {
          // One extra rAF so Bevy's first frame has been composited.
          requestAnimationFrame(() => {
            overlay.classList.add('fade-out');
            overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
          });
        } else {
          requestAnimationFrame(check);
        }
      }
      requestAnimationFrame(check);
    })();
  </script>
</body>
</html>
